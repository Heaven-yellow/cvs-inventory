<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>便利店库存</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--warning:#f59e0b;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-800:#1f2937;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.1);--safe-bottom:env(safe-area-inset-bottom,0px)}html{font-size:16px}body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--gray-100);color:var(--gray-800);line-height:1.5;min-height:100vh;padding-bottom:70px}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:1rem}
.login-card{background:#fff;border-radius:16px;padding:2rem 1.5rem;width:100%;max-width:340px;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.login-card h1{text-align:center;font-size:1.25rem}.login-card p{text-align:center;color:var(--gray-500);font-size:.8rem;margin:.3rem 0 1rem}
.login-card .field{margin-bottom:.8rem}.login-card label{display:block;font-size:.8rem;font-weight:500;margin-bottom:.25rem;color:var(--gray-600)}
.login-card input{width:100%;padding:.6rem .75rem;border:1px solid var(--gray-300);border-radius:8px;font-size:.9rem;outline:none}
.login-card input:focus{border-color:var(--primary);box-shadow:0 0 0 3px #dbeafe}
.login-card .btn-login{width:100%;padding:.65rem;border:none;border-radius:8px;font-size:.95rem;font-weight:600;background:var(--primary);color:#fff;cursor:pointer}
.login-error{color:var(--danger);font-size:.82rem;text-align:center;margin-top:.5rem;display:none}
.app{display:none}.app.show{display:block}
.topbar{background:#fff;padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.topbar h2{font-size:1rem;font-weight:600}.topbar .user-info{font-size:.75rem;color:var(--gray-500);display:flex;align-items:center;gap:.4rem}
.topbar .logout-btn{border:none;background:none;color:var(--danger);font-size:.75rem;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);display:flex;z-index:100;padding-bottom:var(--safe-bottom)}
.bottom-nav a{flex:1;text-align:center;padding:.45rem 0 .35rem;font-size:.65rem;color:var(--gray-400);text-decoration:none}
.bottom-nav a .nav-icon{font-size:1.3rem;display:block;margin-bottom:1px}.bottom-nav a.active{color:var(--primary)}
.page{display:none;padding:.7rem;max-width:700px;margin:0 auto}.page.active{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:.85rem;margin-bottom:.7rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;padding-bottom:.4rem;border-bottom:1px solid var(--gray-100)}
.card-header h3{font-size:.88rem;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin-bottom:.7rem}
.stat-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:.7rem;text-align:center}
.stat-card .num{font-size:1.3rem;font-weight:700}.stat-card .label{font-size:.68rem;color:var(--gray-500)}
.product-item{display:flex;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--gray-100);gap:.5rem}
.product-item:last-child{border-bottom:none}.product-item .info{flex:1;min-width:0}
.product-item .info strong{display:block;font-size:.85rem}.product-item .info small{color:var(--gray-400);font-size:.7rem}
.stock-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.72rem;font-weight:600}
.stock-ok{background:#dcfce7;color:#16a34a}.stock-low{background:#fef3c7;color:#b45309}.stock-critical{background:#fee2e2;color:var(--danger)}
.search-box{position:relative;margin-bottom:.6rem}
.search-box input{width:100%;padding:.5rem .75rem .5rem 1.9rem;border:1px solid var(--gray-300);border-radius:8px;font-size:.85rem;outline:none;background:#fff}
.search-box input:focus{border-color:var(--primary)}.search-box .icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--gray-400)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.3rem;padding:.45rem .8rem;border:none;border-radius:8px;font-size:.8rem;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-success{background:#16a34a;color:#fff}.btn-danger{background:#dc2626;color:#fff}.btn-warning{background:#f59e0b;color:#fff}
.btn-outline{background:transparent;border:1px solid var(--gray-300);color:var(--gray-600)}
.btn-block{width:100%;padding:.55rem;font-size:.88rem}.btn-lg{padding:.6rem 1.1rem}.btn-sm{padding:.25rem .5rem;font-size:.72rem}.btn-xs{padding:.18rem .38rem;font-size:.65rem;border:1px solid var(--gray-300);border-radius:4px;background:#fff;cursor:pointer;color:var(--gray-600)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}.modal-overlay.center{align-items:center}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:slideUp .25s}
.modal-overlay.center .modal{border-radius:16px}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{padding:.8rem 1rem;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:.9rem;font-weight:600}.modal-close{width:30px;height:30px;border:none;background:none;font-size:1.2rem;cursor:pointer;border-radius:6px;color:var(--gray-400)}
.modal-body{padding:.9rem}.modal-footer{padding:.6rem .9rem;border-top:1px solid var(--gray-100);display:flex;gap:.5rem;justify-content:flex-end}
.form-group{margin-bottom:.7rem}.form-group label{display:block;font-size:.75rem;font-weight:500;margin-bottom:.2rem;color:var(--gray-600)}
.form-group input,.form-group select{width:100%;padding:.45rem .65rem;border:1px solid var(--gray-300);border-radius:8px;font-size:.85rem;outline:none;background:#fff}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.sell-prod-list{max-height:200px;overflow-y:auto}
.sell-item{display:flex;align-items:center;padding:.5rem;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:.35rem;gap:.5rem}
.sell-item .si-info{flex:1;min-width:0}.sell-item .si-info strong{font-size:.82rem}.sell-item .si-info small{font-size:.7rem;color:var(--gray-400)}
.sell-item .si-price{font-weight:700;font-size:.88rem;color:var(--danger);white-space:nowrap}
.cart-item{display:flex;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--gray-100);gap:.3rem}
.cart-item .ci-name{flex:1;font-size:.8rem}.cart-item .ci-qty input{width:44px;padding:.2rem;text-align:center;border:1px solid var(--gray-300);border-radius:4px;font-size:.8rem}
.cart-item .ci-subtotal{font-weight:600;font-size:.8rem;min-width:55px;text-align:right}.cart-item .ci-del{border:none;background:none;color:var(--danger);font-size:1rem;cursor:pointer;padding:0 .3rem}
.cart-total{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;font-size:1rem;font-weight:700}
.cart-total .total-price{color:var(--danger);font-size:1.2rem}
.tabs{display:flex;gap:.3rem;margin-bottom:.6rem;background:var(--gray-100);border-radius:8px;padding:3px;overflow-x:auto;flex-wrap:wrap}
.tabs button{flex-shrink:0;padding:.35rem .55rem;border:none;background:none;border-radius:6px;font-size:.75rem;font-weight:500;color:var(--gray-500);cursor:pointer}
.tabs button.active{background:#fff;color:var(--gray-800);box-shadow:var(--shadow)}
.toast-container{position:fixed;top:.6rem;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none;align-items:center}
.toast{pointer-events:auto;padding:.5rem .9rem;border-radius:8px;font-size:.8rem;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:320px;text-align:center}
.toast-success{background:#16a34a;color:#fff}.toast-error{background:#dc2626;color:#fff}.toast-warning{background:#f59e0b;color:#fff}
.empty-state{text-align:center;padding:1.5rem;color:var(--gray-400);font-size:.82rem}.empty-state .icon{font-size:2rem;margin-bottom:.4rem}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--gray-50);font-size:.78rem;gap:.3rem}
.log-item .log-info{flex:1;min-width:0}.log-item .log-time{color:var(--gray-400);font-size:.7rem;white-space:nowrap;display:flex;align-items:center;gap:.3rem}
.filter-bar{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem;font-size:.78rem}
.filter-bar input,.filter-bar select{padding:.35rem .5rem;border:1px solid var(--gray-300);border-radius:6px;font-size:.78rem;outline:none;background:#fff}
.pagination{display:flex;gap:.3rem;align-items:center;justify-content:center;margin-top:.5rem;font-size:.78rem}
.pagination button{padding:.25rem .5rem;border:1px solid var(--gray-300);border-radius:4px;background:#fff;cursor:pointer}.pagination button:disabled{opacity:.4;cursor:default}
.pagination .page-info{color:var(--gray-500);font-size:.75rem}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.7rem;font-weight:600}
.tag-in{background:#dcfce7;color:#16a34a}.tag-out{background:#fef3c7;color:#b45309}.tag-sell{background:#dbeafe;color:var(--primary)}
.user-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid var(--gray-100);font-size:.82rem}
.role-badge{display:inline-block;padding:1px 6px;border-radius:6px;font-size:.68rem;font-weight:600}
.role-sa{background:#fef3c7;color:#b45309}.role-ad{background:#dbeafe;color:var(--primary)}.role-ca{background:#dcfce7;color:#16a34a}
</style>
</head>
<body>
<div class="login-page" id="loginPage"><div class="login-card">
  <h1>🏪 便利店库存</h1><p>v3.1</p>
  <div class="field"><label>账号</label><input type="text" id="loginUsername" placeholder="admin"></div>
  <div class="field"><label>密码</label><input type="password" id="loginPassword" placeholder="admin"></div>
  <button class="btn-login" onclick="doLogin()">登 录</button>
  <div class="login-error" id="loginError"></div>
</div></div>
<div class="app" id="app">
<div class="topbar"><h2 id="pageTitle">工作台</h2><div class="user-info"><span id="userDisplay"></span><button class="logout-btn" onclick="doLogout()">退出</button></div></div>
<!-- 工作台 -->
<div class="page active" id="page-dashboard">
  <div class="stats-grid" id="dashStats"></div>
  <div class="card"><div class="card-header"><h3>⚠️ 库存不足</h3></div><div id="dashLowStock"></div></div>
  <div class="card"><div class="card-header"><h3>📋 最近操作</h3></div><div id="dashRecent"></div></div>
</div>
<!-- 售出 -->
<div class="page" id="page-sell">
  <div class="search-box"><span class="icon">🔍</span><input type="text" id="sellSearch" placeholder="搜索..." oninput="renderSellP()"></div>
  <div class="tabs" id="sellTabs"><button class="active" onclick="setSellCatEl(this,'')">全部</button></div>
  <div class="card" style="padding:.5rem"><div class="sell-prod-list" id="sellProdList"></div></div>
  <div class="card"><div class="card-header"><h3>🛒 待售</h3><span id="sellCartCnt">0</span></div><div id="sellCartList"></div>
    <div class="cart-total"><span>合计</span><span class="total-price" id="sellTotal">¥0.00</span></div>
    <button class="btn btn-success btn-block btn-lg" id="sellBtn" onclick="confirmSell()" disabled>✅ 确认售出</button></div>
  <div class="card"><div class="card-header"><h3>📋 已售记录</h3></div>
    <div class="filter-bar">
      <input type="date" id="shStart" onchange="renderSellHist()"><span style="color:var(--gray-400)">至</span>
      <input type="date" id="shEnd" onchange="renderSellHist()">
      <input type="text" id="shSearch" placeholder="商品名" style="max-width:90px" oninput="renderSellHist()">
    </div>
    <div id="sellHistList"></div><div id="sellHistPg" class="pagination"></div></div>
</div>
<!-- 库存 -->
<div class="page" id="page-inventory">
  <div class="search-box"><span class="icon">🔍</span><input type="text" id="invSearch" placeholder="搜索..." oninput="renderInv()"></div>
  <div class="tabs"><button class="active" onclick="setInvF(this,'')">全部</button><button onclick="setInvF(this,'low')">⚠️不足</button><button onclick="setInvF(this,'critical')">🚨缺货</button></div>
  <div id="invList"></div>
  <button class="btn btn-primary btn-block" id="addBtn" onclick="openProductModal()" style="margin-top:.4rem">＋ 添加商品</button>
</div>
<!-- 日志 -->
<div class="page" id="page-logs">
  <div class="card"><div class="card-header"><h3>📝 操作日志</h3></div>
    <div class="filter-bar">
      <select id="logType" onchange="renderLogs()"><option value="">全部</option><option value="in">入库</option><option value="out">出库</option><option value="sell">售出</option></select>
      <input type="date" id="logStart" onchange="renderLogs()"><span style="color:var(--gray-400)">至</span><input type="date" id="logEnd" onchange="renderLogs()">
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('logType').value='';document.getElementById('logStart').value=daysAgo(30);document.getElementById('logEnd').value=today();logPg=1;renderLogs()">重置</button>
    </div>
    <div id="logList"></div><div id="logPag" class="pagination"></div></div>
</div>
<!-- 报表 -->
<div class="page" id="page-reports">
  <div class="card"><div class="card-header"><h3>📊 报表</h3></div>
    <div class="filter-bar">
      <select id="rpPeriod" onchange="onRpCh()"><option value="daily">日报</option><option value="weekly">周报</option><option value="monthly">月报</option><option value="yearly">年报</option><option value="custom">自定义</option></select>
      <input type="date" id="rpStart" onchange="renderRep()"><span style="color:var(--gray-400)">至</span><input type="date" id="rpEnd" onchange="renderRep()">
      <button class="btn btn-outline btn-sm" onclick="setRp('today')">今天</button><button class="btn btn-outline btn-sm" onclick="setRp('month')">本月</button>
    </div>
    <div id="repSum" class="stats-grid"></div>
    <div id="repTop" class="card" style="display:none"><div class="card-header"><h3>🏆 热销</h3></div><div id="topList"></div></div></div>
</div>
<!-- 管理 -->
<div class="page" id="page-admin">
  <div class="card"><div class="card-header"><h3>👥 用户管理</h3><span style="font-size:.7rem;color:var(--gray-400)">仅超级管理员</span></div>
    <button class="btn btn-primary btn-block" onclick="openUserModal()" style="margin-bottom:.5rem">＋ 添加用户</button>
    <div id="userList"></div></div>
</div>
<nav class="bottom-nav">
  <a class="active" data-page="dashboard" onclick="switchPage('dashboard')"><span class="nav-icon">📊</span>工作台</a>
  <a data-page="sell" onclick="switchPage('sell')"><span class="nav-icon">🧾</span>售出</a>
  <a data-page="inventory" onclick="switchPage('inventory')"><span class="nav-icon">📦</span>库存</a>
  <a data-page="logs" onclick="switchPage('logs')"><span class="nav-icon">📝</span>日志</a>
  <a data-page="reports" onclick="switchPage('reports')"><span class="nav-icon">📊</span>报表</a>
  <a data-page="admin" onclick="switchPage('admin')"><span class="nav-icon">⚙️</span>管理</a>
</nav>
</div>
<!-- Modals -->
<div class="modal-overlay center" id="productModal"><div class="modal">
<div class="modal-header"><h3 id="pmTitle">商品</h3><button class="modal-close" onclick="closeModal('productModal')">✕</button></div>
<div class="modal-body"><input type="hidden" id="editPid">
<div class="form-group"><label>名称 *</label><input type="text" id="fName"></div>
<div class="form-row"><div class="form-group"><label>条码</label><input type="text" id="fBarcode"></div><div class="form-group"><label>分类 *</label><select id="fCategory"></select></div></div>
<div class="form-row"><div class="form-group"><label>库存</label><input type="number" id="fQty" min="0" value="0"></div><div class="form-group"><label>警戒</label><input type="number" id="fMin" min="0" value="5"></div></div>
<div class="form-row"><div class="form-group"><label>进价</label><input type="number" id="fCost" min="0" step="0.01"></div><div class="form-group"><label>售价 *</label><input type="number" id="fPrice" min="0" step="0.01"></div></div>
<div class="form-row"><div class="form-group"><label>供应商</label><input type="text" id="fSupplier"></div><div class="form-group"><label>货架</label><input type="text" id="fShelf"></div></div>
</div>
<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('productModal')">取消</button><button class="btn btn-primary" onclick="saveProduct()">保存</button></div>
</div></div>
<div class="modal-overlay center" id="stockModal"><div class="modal">
<div class="modal-header"><h3>库存操作</h3><button class="modal-close" onclick="closeModal('stockModal')">✕</button></div>
<div class="modal-body">
<div class="tabs" style="margin-bottom:.6rem"><button class="active" id="stIn" onclick="setSTab('in')">📥入库</button><button id="stOut" onclick="setSTab('out')">📤出库</button></div>
<div class="form-group"><label>商品</label><select id="stockP"></select></div>
<div class="form-group"><label>数量</label><input type="number" id="stockQ" min="1" value="1"></div>
<div class="form-group" id="scG"><label>进价（可选）</label><input type="number" id="stockC" min="0" step="0.01"></div>
<div class="form-group" id="spG" style="display:none"><label>售价（可选）</label><input type="number" id="stockP2" min="0" step="0.01"></div>
<div class="form-group"><label>备注</label><input type="text" id="stockN" placeholder="备注"></div>
</div>
<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('stockModal')">取消</button><button class="btn btn-success" id="stockBtn" onclick="confirmStock()">✅确认入库</button></div>
</div></div>
<div class="modal-overlay center" id="userModal"><div class="modal">
<div class="modal-header"><h3>用户</h3><button class="modal-close" onclick="closeModal('userModal')">✕</button></div>
<div class="modal-body"><input type="hidden" id="editUid">
<div class="form-group"><label>账号 *</label><input type="text" id="uName"></div>
<div class="form-group"><label>名称 *</label><input type="text" id="uDisplay"></div>
<div class="form-group"><label>密码</label><input type="password" id="uPass" placeholder="留空不修改"></div>
<div class="form-group"><label>角色</label><select id="uRole"><option value="admin">管理员</option><option value="cashier">收银员</option></select></div>
</div>
<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('userModal')">取消</button><button class="btn btn-primary" onclick="saveUser()">保存</button></div>
</div></div>
<div class="toast-container" id="toastContainer"></div>
<script>
var T=localStorage.getItem('cvs_token'),U=null;
function $call(m,url,body){
  return new Promise(function(resolve,reject){
    var x=new XMLHttpRequest();x.open(m,url,true);x.setRequestHeader('Content-Type','application/json');
    if(T)x.setRequestHeader('Authorization','Bearer '+T);
    x.onload=function(){
      try{var d=JSON.parse(x.responseText);if(x.status>=200&&x.status<300)resolve(d);else reject(new Error(d.error||'请求失败'))}
      catch(e){reject(new Error('服务器错误'))}
    };x.onerror=function(){reject(new Error('网络错误'))};x.send(body?JSON.stringify(body):null);
  });
}
function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function daysAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function toast(msg,t){t=t||'info';var c=document.getElementById('toastContainer'),x=document.createElement('div');x.className='toast toast-'+t;x.textContent=msg;c.appendChild(x);setTimeout(function(){x.style.opacity='0';x.style.transition='.3s';setTimeout(function(){x.remove()},300)},2000)}
function doLogin(){
  var u=document.getElementById('loginUsername').value.trim(),p=document.getElementById('loginPassword').value.trim(),e=document.getElementById('loginError');
  e.style.display='none';if(!u||!p){e.textContent='请输入账号和密码';e.style.display='block';return}
  $call('POST','/api/login',{username:u,password:p}).then(function(d){T=d.token;U=d.user;localStorage.setItem('cvs_token',T);enterApp()})
  .catch(function(x){e.textContent=x.message;e.style.display='block'});
}
function doLogout(){localStorage.removeItem('cvs_token');T=null;U=null;document.getElementById('loginPage').style.display='flex';document.getElementById('app').classList.remove('show')}
function switchPage(n){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});document.getElementById('page-'+n).classList.add('active');
  document.querySelectorAll('.bottom-nav a').forEach(function(a){a.classList.remove('active')});var nav=document.querySelector('.bottom-nav a[data-page="'+n+'"]');if(nav)nav.classList.add('active');

function sr(){var s=(document.getElementById('sellSearch').value||'').toLowerCase(),l=store;if(s)l=l.filter(function(p){return p.name.toLowerCase().indexOf(s)>=0});if(sellCat)l=l.filter(function(p){return p.category===sellCat});l=l.filter(function(p){return p.qty>0});var c=document.getElementById('sellProdList');if(l.length===0){c.innerHTML='<div class="empty-state"><div class="icon">📦</div><p>无商品</p></div>';renderSellCart();return}

function renderSellCart(){var c=document.getElementById('sellCartList'),tEl=document.getElementById('sellTotal'),btn=document.getElementById('sellBtn');document.getElementById('sellCartCnt').textContent=cart.reduce(function(s,i){return s+i.qty},0)+'件';if(!cart.length){c.innerHTML='<div class="empty-state" style="padding:.5rem"><p>点击 ＋ 加入</p></div>';tEl.textContent='¥0.00';btn.disabled=true;return}btn.disabled=false;var t=0;c.innerHTML=cart.map(function(item){var sub=item.qty*item.price;t+=sub;return'<div class="cart-item"><span class="ci-name">'+item.product_name+'</span><span class="ci-qty"><input type="number" min="1" max="'+(store.find(function(p){return p.id===item.product_id})||{}).qty||99+'" value="'+item.qty+'" onchange="updSell(\''+item.product_id+'\',this.value)"></span><span class="ci-subtotal">¥'+sub.toFixed(2)+'</span><button class="ci-del" onclick="rmSell(\''+item.product_id+'\')">✕</button></div>'}).join('');tEl.textContent='¥'+t.toFixed(2)}
function confirmSell(){if(!cart.length){toast('请添加','warning');return}var q=cart.reduce(function(s,i){return s+i.qty},0),t=cart.reduce(function(s,i){return s+i.qty*i.price},0);if(!confirm('售出 '+q+' 件，¥'+t.toFixed(2)+'？'))return;$call('POST','/api/sell',{items:cart.map(function(i){return{product_id:i.product_id,qty:i.qty,price:i.price}})}).then(function(d){toast('售出成功 ¥'+d.total,'success');cart=[];sr();renderDash();renderSellHist()}).catch(function(e){toast(e.message,'error')})}
var shPg=1;
function renderSellHist(){var sd=document.getElementById('shStart').value,ed=document.getElementById('shEnd').value,sr=document.getElementById('shSearch').value.trim();var qs='start_date='+(sd||'2000-01-01')+'&end_date='+(ed||'2099-12-31')+'&page='+shPg+'&page_size=20';if(sr)qs+='&search='+encodeURIComponent(sr);$call('GET','/api/sell-logs?'+qs).then(function(d){var c=document.getElementById('sellHistList');if(d.logs.length===0){c.innerHTML='<div class="empty-state"><p>暂无</p></div>';document.getElementById('sellHistPg').innerHTML='';return}c.innerHTML=d.logs.map(function(l){return'<div class="log-item"><div class="log-info"><span class="tag tag-sell">售出</span> <strong>'+l.product_name+'</strong> ×'+l.qty+(l.operator?' · '+l.operator:'')+'</div><div class="log-time">'+l.time+' <button class="btn-xs" onclick="revertSell('+l._idx+')">↩撤回</button></div></div>'}).join('');var pg=document.getElementById('sellHistPg');pg.innerHTML='<button '+(shPg<=1?'disabled':'')+' onclick="shPg=1;renderSellHist()">首页</button><button '+(shPg<=1?'disabled':'')+' onclick="shPg--;renderSellHist()">上一页</button><span class="page-info">'+d.page+'/'+d.total_pages+'</span><button '+(shPg>=d.total_pages?'disabled':'')+' onclick="shPg++;renderSellHist()">下一页</button>'}).catch(function(){})}

function renderInv(){var qs='';if(invFilter)qs+='stock_status='+invFilter+'&';var s=document.getElementById('invSearch').value.trim();if(s)qs+='search='+encodeURIComponent(s);$call('GET','/api/products?'+qs).then(function(ps){$call('GET','/api/settings').then(function(set){var lo=parseInt(set.low_threshold)||10,cr=parseInt(set.critical_threshold)||3,c=document.getElementById('invList');if(ps.length===0){c.innerHTML='<div class="empty-state"><div class="icon">📦</div><p>暂无</p></div>';return}c.innerHTML=ps.map(function(p){var bd,cls;if(p.qty<=cr){bd='缺货';cls='stock-critical'}else if(p.qty<=lo){bd='不足';cls='stock-low'}else{bd='正常';cls='stock-ok'}return'<div class="product-item"><div class="info"><strong>'+p.name+'</strong><small>'+(p.category||'')+(p.shelf?' · '+p.shelf:'')+' · ¥'+Number(p.price).toFixed(2)+'</small></div><span class="stock-badge '+cls+'">'+p.qty+' · '+bd+'</span>'+(U&&U.role!=='cashier'?'<button class="btn btn-outline btn-sm" onclick="openStockModal(\''+p.id+'\')">🔄</button><button class="btn btn-outline btn-sm" onclick="editProduct(\''+p.id+'\')">✏️</button>':'')+'</div>'}).join('')}).catch(function(){})}).catch(function(){})}
function openProductModal(){document.getElementById('pmTitle').textContent='添加商品';document.getElementById('editPid').value='';['fName','fBarcode','fSupplier','fShelf'].forEach(function(i){document.getElementById(i).value=''});document.getElementById('fQty').value=0;document.getElementById('fMin').value=5;document.getElementById('fCost').value='';document.getElementById('fPrice').value='';document.getElementById('fCategory').value='';openModal('productModal')}

function saveProduct(){var id=document.getElementById('editPid').value,n=document.getElementById('fName').value.trim(),c=document.getElementById('fCategory').value,p=parseFloat(document.getElementById('fPrice').value);if(!n){toast('请输入名称','warning');return}if(!c){toast('请选择分类','warning');return}if(!p&&p!==0){toast('请输入售价','warning');return}var b={name:n,barcode:document.getElementById('fBarcode').value.trim(),category:c,supplier:document.getElementById('fSupplier').value.trim(),qty:parseInt(document.getElementById('fQty').value)||0,min_stock:parseInt(document.getElementById('fMin').value)||5,cost:parseFloat(document.getElementById('fCost').value)||0,price:p,shelf:document.getElementById('fShelf').value.trim()};var req=id?$call('PUT','/api/products/'+id,b):$call('POST','/api/products',b);req.then(function(){toast(id?'已更新':'已添加','success');closeModal('productModal');renderInv();renderSellP()}).catch(function(e){toast(e.message,'error')})}

var logPg=1;
function renderLogs(){var t=document.getElementById('logType').value,sd=document.getElementById('logStart').value,ed=document.getElementById('logEnd').value;var qs='type='+(t||'')+'&start_date='+(sd||'2000-01-01')+'&end_date='+(ed||'2099-12-31')+'&page='+logPg+'&page_size=30';$call('GET','/api/logs?'+qs).then(function(d){var c=document.getElementById('logList');if(d.logs.length===0){c.innerHTML='<div class="empty-state"><div class="icon">📝</div><p>暂无</p></div>';document.getElementById('logPag').innerHTML='';return}c.innerHTML=d.logs.map(function(l){var t=l.type==='in'?'入库':l.type==='out'?'出库':'售出',tag=l.type==='in'?'tag-in':l.type==='out'?'tag-out':'tag-sell';return'<div class="log-item"><div class="log-info"><span class="tag '+tag+'">'+t+'</span> <strong>'+l.product_name+'</strong> ×'+l.qty+(l.operator?' · '+l.operator:'')+(l.note?' · '+l.note:'')+'</div><div class="log-time">'+l.time+'</div></div>'}).join('');var pg=document.getElementById('logPag');pg.innerHTML='<button '+(logPg<=1?'disabled':'')+' onclick="logPg=1;renderLogs()">首页</button><button '+(logPg<=1?'disabled':'')+' onclick="logPg--;renderLogs()">上一页</button><span class="page-info">'+d.page+'/'+d.total_pages+' (共'+d.total+')</span><button '+(logPg>=d.total_pages?'disabled':'')+' onclick="logPg++;renderLogs()">下一页</button>'}).catch(function(){})}
function onRpCh(){var p=document.getElementById('rpPeriod').value,t=today();if(p==='daily'){document.getElementById('rpStart').value=t;document.getElementById('rpEnd').value=t}else if(p==='weekly'){var d=new Date();d.setDate(d.getDate()-d.getDay());document.getElementById('rpStart').value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');document.getElementById('rpEnd').value=t}else if(p==='monthly'){document.getElementById('rpStart').value=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0')+'-01';document.getElementById('rpEnd').value=t}else if(p==='yearly'){document.getElementById('rpStart').value=new Date().getFullYear()+'-01-01';document.getElementById('rpEnd').value=t}renderRep()}

function renderRep(){var sd=document.getElementById('rpStart').value,ed=document.getElementById('rpEnd').value;if(!sd||!ed)return;$call('GET','/api/reports?start_date='+sd+'&end_date='+ed).then(function(d){document.getElementById('repSum').innerHTML='<div class="stat-card"><div class="num" style="color:#16a34a">'+d.summary.totalInQty+'</div><div class="label">入库总数</div></div><div class="stat-card"><div class="num" style="color:#2563eb">'+d.summary.totalSellQty+'</div><div class="label">售出总数</div></div><div class="stat-card"><div class="num" style="color:#dc2626">¥'+Number(d.summary.totalSales).toFixed(0)+'</div><div class="label">销售金额</div></div><div class="stat-card"><div class="num">'+d.summary.totalSellItems+'</div><div class="label">交易笔数</div></div>';var t=document.getElementById('repTop');if(d.topSell&&d.topSell.length>0){t.style.display='block';document.getElementById('topList').innerHTML=d.topSell.map(function(p,i){return'<div class="product-item"><div class="info"><strong>'+(i+1)+'. '+p.name+'</strong></div><span style="font-weight:700;color:#dc2626">售出 '+p.qty+'</span></div>'}).join('')}else t.style.display='none'}).catch(function(){})}
