<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>便利店库存管理 v2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--warning:#f59e0b;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-800:#1f2937;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.1);--safe-bottom:env(safe-area-inset-bottom,0px)}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--gray-100);color:var(--gray-800);line-height:1.5;min-height:100vh;padding-bottom:70px}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:1rem}
.login-card{background:#fff;border-radius:16px;padding:2rem 1.5rem;width:100%;max-width:340px;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.login-card h1{text-align:center;margin-bottom:.2rem;font-size:1.25rem}
.login-card p{text-align:center;color:var(--gray-500);font-size:.8rem;margin-bottom:1rem}
.login-card .field{margin-bottom:.8rem}
.login-card label{display:block;font-size:.8rem;font-weight:500;margin-bottom:.25rem;color:var(--gray-600)}
.login-card input{width:100%;padding:.6rem .75rem;border:1px solid var(--gray-300);border-radius:8px;font-size:.9rem;outline:none}
.login-card input:focus{border-color:var(--primary);box-shadow:0 0 0 3px #dbeafe}
.login-card .btn-login{width:100%;padding:.65rem;border:none;border-radius:8px;font-size:.95rem;font-weight:600;background:var(--primary);color:#fff;cursor:pointer}
.login-card .btn-login:active{opacity:.85}
.login-error{color:var(--danger);font-size:.82rem;text-align:center;margin-top:.5rem;display:none}
.app{display:none}.app.show{display:block}
.topbar{background:#fff;padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.topbar h2{font-size:1rem;font-weight:600}
.topbar .user-info{font-size:.75rem;color:var(--gray-500);display:flex;align-items:center;gap:.4rem}
.topbar .logout-btn{border:none;background:none;color:var(--danger);font-size:.75rem;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);display:flex;z-index:100;padding-bottom:var(--safe-bottom)}
.bottom-nav a{flex:1;text-align:center;padding:.45rem 0 .35rem;font-size:.65rem;color:var(--gray-400);text-decoration:none}
.bottom-nav a .nav-icon{font-size:1.3rem;display:block;margin-bottom:1px}
.bottom-nav a.active{color:var(--primary)}
.page{display:none;padding:.7rem;max-width:700px;margin:0 auto}
.page.active{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:.85rem;margin-bottom:.7rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;padding-bottom:.4rem;border-bottom:1px solid var(--gray-100)}
.card-header h3{font-size:.88rem;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin-bottom:.7rem}
.stat-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:.7rem;text-align:center}
.stat-card .num{font-size:1.3rem;font-weight:700;line-height:1.3}
.stat-card .label{font-size:.68rem;color:var(--gray-500)}
.product-item{display:flex;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--gray-100);gap:.5rem}
.product-item:last-child{border-bottom:none}
.product-item .info{flex:1;min-width:0}
.product-item .info strong{display:block;font-size:.85rem}
.product-item .info small{color:var(--gray-400);font-size:.7rem}
.stock-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.72rem;font-weight:600;white-space:nowrap}
.stock-ok{background:#dcfce7;color:#16a34a}
.stock-low{background:#fef3c7;color:#b45309}
.stock-critical{background:#fee2e2;color:var(--danger)}
.search-box{position:relative;margin-bottom:.6rem}
.search-box input{width:100%;padding:.5rem .75rem .5rem 1.9rem;border:1px solid var(--gray-300);border-radius:8px;font-size:.85rem;outline:none;background:#fff}
.search-box input:focus{border-color:var(--primary)}
.search-box .icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--gray-400)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.3rem;padding:.45rem .8rem;border:none;border-radius:8px;font-size:.8rem;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-success{background:#16a34a;color:#fff}.btn-danger{background:var(--danger);color:#fff}.btn-outline{background:transparent;border:1px solid var(--gray-300);color:var(--gray-600)}
.btn-block{width:100%;padding:.55rem;font-size:.88rem}.btn-lg{padding:.6rem 1.1rem;font-size:.88rem}.btn-sm{padding:.25rem .5rem;font-size:.72rem}
.btn-sm-2{padding:.15rem .4rem;font-size:.7rem;border:1px solid var(--gray-300);border-radius:4px;background:#fff;cursor:pointer;color:var(--gray-600)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}.modal-overlay.center{align-items:center}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:slideUp .25s}
.modal-overlay.center .modal{border-radius:16px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{padding:.8rem 1rem;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:.9rem;font-weight:600}
.modal-close{width:30px;height:30px;border:none;background:none;font-size:1.2rem;cursor:pointer;border-radius:6px;color:var(--gray-400)}
.modal-body{padding:.9rem}.modal-footer{padding:.6rem .9rem;border-top:1px solid var(--gray-100);display:flex;gap:.5rem;justify-content:flex-end}
.form-group{margin-bottom:.7rem}
.form-group label{display:block;font-size:.75rem;font-weight:500;margin-bottom:.2rem;color:var(--gray-600)}
.form-group input,.form-group select{width:100%;padding:.45rem .65rem;border:1px solid var(--gray-300);border-radius:8px;font-size:.85rem;outline:none;background:#fff}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}
.form-group textarea{width:100%;padding:.45rem .65rem;border:1px solid var(--gray-300);border-radius:8px;font-size:.85rem;outline:none;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.sell-prod-list{max-height:260px;overflow-y:auto}
.sell-item{display:flex;align-items:center;padding:.5rem;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:.35rem;gap:.5rem}
.sell-item .si-info{flex:1;min-width:0}
.sell-item .si-info strong{font-size:.82rem;display:block}
.sell-item .si-info small{font-size:.7rem;color:var(--gray-400)}
.sell-item .si-price{font-weight:700;font-size:.88rem;color:var(--danger);white-space:nowrap}
.cart-item{display:flex;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--gray-100);gap:.3rem}
.cart-item .ci-name{flex:1;font-size:.8rem}
.cart-item .ci-qty input{width:44px;padding:.2rem;text-align:center;border:1px solid var(--gray-300);border-radius:4px;font-size:.8rem}
.cart-item .ci-subtotal{font-weight:600;font-size:.8rem;white-space:nowrap;min-width:55px;text-align:right}
.cart-item .ci-del{border:none;background:none;color:var(--danger);font-size:1rem;cursor:pointer;padding:0 .3rem}
.cart-total{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;font-size:1rem;font-weight:700}
.cart-total .total-price{color:var(--danger);font-size:1.2rem}
.tabs{display:flex;gap:.3rem;margin-bottom:.6rem;background:var(--gray-100);border-radius:8px;padding:3px;overflow-x:auto;flex-wrap:wrap}
.tabs button{flex-shrink:0;padding:.35rem .55rem;border:none;background:none;border-radius:6px;font-size:.75rem;font-weight:500;color:var(--gray-500);cursor:pointer}
.tabs button.active{background:#fff;color:var(--gray-800);box-shadow:var(--shadow)}
.toast-container{position:fixed;top:.6rem;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none;align-items:center}
.toast{pointer-events:auto;padding:.5rem .9rem;border-radius:8px;font-size:.8rem;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:320px;text-align:center}
.toast-success{background:#16a34a;color:#fff}.toast-error{background:var(--danger);color:#fff}.toast-warning{background:#f59e0b;color:#fff}.toast-info{background:var(--primary);color:#fff}
.empty-state{text-align:center;padding:1.5rem;color:var(--gray-400);font-size:.82rem}
.empty-state .icon{font-size:2rem;margin-bottom:.4rem}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--gray-50);font-size:.78rem;gap:.3rem}
.log-item .log-info{flex:1;min-width:0}
.log-item .log-time{color:var(--gray-400);font-size:.7rem;white-space:nowrap;display:flex;align-items:center;gap:.3rem}
.user-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid var(--gray-100);font-size:.82rem}
.role-badge{display:inline-block;padding:1px 6px;border-radius:6px;font-size:.68rem;font-weight:600}
.role-admin{background:#fef3c7;color:#b45309}.role-cashier{background:#dbeafe;color:var(--primary)}
table{width:100%;font-size:.78rem;border-collapse:collapse}
th{text-align:left;padding:.4rem .3rem;color:var(--gray-500);font-weight:600;border-bottom:1px solid var(--gray-200)}
td{padding:.35rem .3rem;border-bottom:1px solid var(--gray-100)}
.flex{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.filter-bar{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem;font-size:.78rem}
.filter-bar input,.filter-bar select{padding:.35rem .5rem;border:1px solid var(--gray-300);border-radius:6px;font-size:.78rem;outline:none;background:#fff}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--primary)}
.pagination{display:flex;gap:.3rem;align-items:center;justify-content:center;margin-top:.5rem;font-size:.78rem}
.pagination button{padding:.25rem .5rem;border:1px solid var(--gray-300);border-radius:4px;background:#fff;cursor:pointer}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination .page-info{color:var(--gray-500);font-size:.75rem}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.7rem;font-weight:600}
.tag-in{background:#dcfce7;color:#16a34a}
.tag-out{background:#fef3c7;color:#b45309}
.tag-sell{background:#dbeafe;color:var(--primary)}
</style>
</head>
<body>
<div class="login-page" id="loginPage">
  <div class="login-card">
    <h1>🏪 便利店库存</h1>
    <p>v2.1 — 售出 · 日志 · 报表 · 撤回</p>
    <div class="field"><label>账号</label><input type="text" id="loginUsername" placeholder="输入账号"></div>
    <div class="field"><label>密码</label><input type="password" id="loginPassword" placeholder="输入密码"></div>
    <button class="btn-login" onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <h2 id="pageTitle">工作台</h2>
    <div class="user-info">
      <span id="userDisplay"></span>
      <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>
  </div>

  <!-- 工作台 -->
  <div class="page active" id="page-dashboard">
    <div class="stats-grid" id="dashStats"></div>
    <div class="card"><div class="card-header"><h3>⚠️ 库存不足</h3></div><div id="dashLowStock"><div class="empty-state"><p>暂无 ✅</p></div></div></div>
    <div class="card"><div class="card-header"><h3>📋 最近操作</h3></div><div id="dashRecent"><div class="empty-state"><p>暂无记录</p></div></div></div>
  </div>

  <!-- 售出 -->
  <div class="page" id="page-sell">
    <div class="search-box"><span class="icon">🔍</span><input type="text" id="sellSearch" placeholder="搜索商品..." oninput="renderSellProducts()"></div>
    <div class="tabs" id="sellTabs"><button class="active" onclick="setSellCat(this,'')">全部</button></div>
    <div class="card" style="padding:.5rem;"><div class="sell-prod-list" id="sellProductList"><div class="empty-state"><div class="icon">📦</div><p>暂无商品</p></div></div></div>
    <div class="card">
      <div class="card-header"><h3>🛒 待售清单</h3><span id="sellCartCount" style="font-size:.74rem;color:var(--gray-400)">0 件</span></div>
      <div id="sellCartList"><div class="empty-state" style="padding:.5rem;"><p>点击商品旁的 ＋ 加入</p></div></div>
      <div class="cart-total"><span>合计</span><span class="total-price" id="sellTotal">¥0.00</span></div>
      <button class="btn btn-success btn-block btn-lg" id="sellBtn" onclick="confirmSell()" disabled>✅ 确认售出</button>
    </div>
  </div>

  <!-- 库存 -->
  <div class="page" id="page-inventory">
    <div class="search-box"><span class="icon">🔍</span><input type="text" id="invSearch" placeholder="搜索商品..." oninput="renderInventory()"></div>
    <div class="tabs"><button class="active" onclick="setInvFilter(this,'')">全部</button><button onclick="setInvFilter(this,'low')">⚠️ 不足</button><button onclick="setInvFilter(this,'critical')">🚨 缺货</button></div>
    <div id="invList"></div>
    <button class="btn btn-primary btn-block" id="addProductBtn" onclick="openProductModal()" style="margin-top:.4rem;">＋ 添加商品</button>
  </div>

  <!-- 日志 -->
  <div class="page" id="page-logs">
    <div class="card"><div class="card-header"><h3>📝 操作日志</h3></div>
      <div class="filter-bar">
        <select id="logTypeFilter" onchange="renderLogs()"><option value="">全部类型</option><option value="in">入库</option><option value="out">出库</option><option value="sell">售出</option></select>
        <input type="date" id="logStartDate" onchange="renderLogs()"><span style="color:var(--gray-400);font-size:.7rem;">至</span>
        <input type="date" id="logEndDate" onchange="renderLogs()">
        <button class="btn btn-outline btn-sm" onclick="resetLogFilters()">重置</button>
      </div>
      <div id="logList"><div class="empty-state"><p>加载中...</p></div></div>
      <div id="logPagination" class="pagination"></div>
    </div>
  </div>

  <!-- 报表 -->
  <div class="page" id="page-reports">
    <div class="card"><div class="card-header"><h3>📊 数据报表</h3></div>
      <div class="filter-bar">
        <select id="reportPeriod" onchange="onReportPeriodChange()"><option value="daily">日报</option><option value="weekly">周报</option><option value="monthly">月报</option><option value="yearly">年报</option><option value="custom">自定义</option></select>
        <input type="date" id="reportStartDate" onchange="renderReport()"><span style="color:var(--gray-400);font-size:.7rem;">至</span>
        <input type="date" id="reportEndDate" onchange="renderReport()">
        <button class="btn btn-outline btn-sm" onclick="setPeriod('today')">今天</button>
        <button class="btn btn-outline btn-sm" onclick="setPeriod('month')">本月</button>
      </div>
      <div id="reportSummary" class="stats-grid"></div>
      <div id="reportTopSell" class="card" style="display:none;"><div class="card-header"><h3>🏆 热销排行</h3></div><div id="topSellList"></div></div>
    </div>
  </div>

  <!-- 管理 -->
  <div class="page" id="page-admin">
    <div class="tabs"><button class="active" onclick="switchAdminTab(this,'users')">👥 用户</button><button onclick="switchAdminTab(this,'settings')">⚙️ 设置</button></div>
    <div id="adminUsers"><button class="btn btn-primary btn-block" onclick="openUserModal()" style="margin-bottom:.5rem;">＋ 添加用户</button><div id="userList"></div></div>
    <div id="adminSettings" style="display:none;">
      <div class="card">
        <div class="form-group"><label>库存预警值</label><div class="form-row"><div><label style="font-size:.68rem;color:var(--gray-400);">不足 (≤)</label><input type="number" id="setLow"></div><div><label style="font-size:.68rem;color:var(--gray-400);">缺货 (≤)</label><input type="number" id="setCritical"></div></div></div>
        <div class="form-group"><label>分类（每行一个）</label><textarea id="setCategories" rows="4" style="width:100%;padding:.45rem .65rem;border:1px solid #d1d5db;border-radius:8px;font-size:.85rem;resize:vertical;"></textarea></div>
        <div class="form-group"><label>商店名称</label><input type="text" id="setShopName"></div>
        <button class="btn btn-primary btn-block" onclick="saveAdminSettings()">💾 保存设置</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="active" data-page="dashboard" onclick="switchPage('dashboard')"><span class="nav-icon">📊</span>工作台</a>
    <a data-page="sell" onclick="switchPage('sell')"><span class="nav-icon">🧾</span>售出</a>
    <a data-page="inventory" onclick="switchPage('inventory')"><span class="nav-icon">📦</span>库存</a>
    <a data-page="logs" onclick="switchPage('logs')"><span class="nav-icon">📝</span>日志</a>
    <a data-page="reports" onclick="switchPage('reports')"><span class="nav-icon">📊</span>报表</a>
    <a data-page="admin" onclick="switchPage('admin')"><span class="nav-icon">⚙️</span>管理</a>
  </nav>
</div>

<!-- Modals -->
<div class="modal-overlay center" id="productModal"><div class="modal">
  <div class="modal-header"><h3 id="productModalTitle">商品</h3><button class="modal-close" onclick="closeModal('productModal')">✕</button></div>
  <div class="modal-body">
    <input type="hidden" id="editProductId">
    <div class="form-group"><label>名称 *</label><input type="text" id="fName"></div>
    <div class="form-row"><div class="form-group"><label>条码</label><input type="text" id="fBarcode"></div><div class="form-group"><label>分类 *</label><select id="fCategory"></select></div></div>
    <div class="form-row"><div class="form-group"><label>库存</label><input type="number" id="fQty" min="0" value="0"></div><div class="form-group"><label>最低警戒</label><input type="number" id="fMinStock" min="0" value="5"></div></div>
    <div class="form-row"><div class="form-group"><label>进价</label><input type="number" id="fCost" min="0" step="0.01"></div><div class="form-group"><label>售价 *</label><input type="number" id="fPrice" min="0" step="0.01"></div></div>
    <div class="form-row"><div class="form-group"><label>供应商</label><input type="text" id="fSupplier"></div><div class="form-group"><label>货架</label><input type="text" id="fShelf"></div></div>
  </div>
  <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('productModal')">取消</button><button class="btn btn-primary" onclick="saveProduct()">保存</button></div>
</div></div>

<div class="modal-overlay center" id="stockModal"><div class="modal">
  <div class="modal-header"><h3>库存操作</h3><button class="modal-close" onclick="closeModal('stockModal')">✕</button></div>
  <div class="modal-body">
    <div class="tabs" style="margin-bottom:.6rem;"><button class="active" id="stockTabIn" onclick="setStockTab('in')">📥 入库</button><button id="stockTabOut" onclick="setStockTab('out')">📤 出库</button></div>
    <div class="form-group"><label>商品</label><select id="stockProductSelect"></select></div>
    <div class="form-group"><label>数量</label><input type="number" id="stockQty" min="1" value="1"></div>
    <div class="form-group" id="stockCostGroup"><label>进价（可选）</label><input type="number" id="stockCost" min="0" step="0.01"></div>
    <div class="form-group" id="stockPriceGroup" style="display:none;"><label>售价（可选）</label><input type="number" id="stockPrice" min="0" step="0.01"></div>
    <div class="form-group"><label>备注</label><input type="text" id="stockNote" placeholder="如：供应商送货"></div>
  </div>
  <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('stockModal')">取消</button><button class="btn btn-success" id="stockConfirmBtn" onclick="confirmStock()">✅ 确认</button></div>
</div></div>

<div class="modal-overlay center" id="userModal"><div class="modal">
  <div class="modal-header"><h3>用户</h3><button class="modal-close" onclick="closeModal('userModal')">✕</button></div>
  <div class="modal-body">
    <input type="hidden" id="editUserId">
    <div class="form-group"><label>账号 *</label><input type="text" id="uUsername"></div>
    <div class="form-group"><label>名称 *</label><input type="text" id="uDisplayName"></div>
    <div class="form-group"><label>密码 *</label><input type="password" id="uPassword"></div>
    <div class="form-group"><label>角色</label><select id="uRole"><option value="cashier">收银员</option><option value="admin">管理员</option></select></div>
  </div>
  <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('userModal')">取消</button><button class="btn btn-primary" onclick="saveUser()">保存</button></div>
</div></div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ---- API ----
const API = window.location.origin;
let token = localStorage.getItem('cvs_token');
let user = null;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

function today() { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function daysAgo(n) { const d = new Date(); d.setDate(d.getDate()-n); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

// ---- Auth ----
async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!username || !password) { errEl.textContent = '请输入账号和密码'; errEl.style.display = 'block'; return; }
  try {
    const data = await api('POST', '/api/login', { username, password });
    token = data.token; user = data.user;
    localStorage.setItem('cvs_token', token);
    enterApp();
  } catch(e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
}

function doLogout() {
  localStorage.removeItem('cvs_token'); token = null; user = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('app').classList.remove('show');
}

function toast(msg, type) {
  type = type || 'info';
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div'); t.className = 'toast toast-' + type; t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = '.3s'; setTimeout(() => t.remove(), 300); }, 2000);
}

async function enterApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('userDisplay').textContent = (user.display_name || user.username) + ' · ' + (user.role === 'admin' ? '管理员' : '收银员');

  const adminNav = document.querySelector('[data-page="admin"]');
  if (adminNav) adminNav.style.display = user.role === 'admin' ? 'block' : 'none';
  document.getElementById('addProductBtn').style.display = user.role === 'admin' ? 'block' : 'none';

  document.getElementById('logStartDate').value = daysAgo(7);
  document.getElementById('logEndDate').value = today();
  document.getElementById('reportStartDate').value = today();
  document.getElementById('reportEndDate').value = today();

  await loadCategories();
  await Promise.all([renderDashboard(), renderSellProducts(), renderInventory(), renderLogs(), renderReport(), renderUsers()]);
  try { const s = await api('GET', '/api/settings');
    document.getElementById('setLow').value = s.low_threshold;
    document.getElementById('setCritical').value = s.critical_threshold;
    document.getElementById('setCategories').value = (s.categories || []).join('\n');
    document.getElementById('setShopName').value = s.shop_name || '';
  } catch(e) {}
}

// ---- Navigation ----
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.bottom-nav a').forEach(a => a.classList.remove('active'));
  const nav = document.querySelector(`.bottom-nav a[data-page="${name}"]`);
  if (nav) nav.classList.add('active');
  const titles = { dashboard:'工作台', sell:'售出', inventory:'库存管理', logs:'操作日志', reports:'数据报表', admin:'系统管理' };
  document.getElementById('pageTitle').textContent = titles[name] || '';
  if (name === 'dashboard') renderDashboard();
  if (name === 'sell') renderSellProducts();
  if (name === 'inventory') renderInventory();
  if (name === 'logs') renderLogs();
  if (name === 'reports') renderReport();
  if (name === 'admin') renderUsers();
}
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('show'); });

// ---- Categories ----
let categories = [];
async function loadCategories() {
  try { const s = await api('GET', '/api/settings'); categories = s.categories || []; } catch(e) {}
  document.getElementById('sellTabs').innerHTML = '<button class="active" onclick="setSellCat(this,\'\')">全部</button>';
  categories.forEach(c => { document.getElementById('sellTabs').innerHTML += '<button onclick="setSellCat(this,\''+c+'\')">'+c+'</button>'; });

// ---- Sell ----
let sellProducts = []; let sellCart = []; let sellCat = '';

function setSellCat(el, cat) {
  document.querySelectorAll('#sellTabs button').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); sellCat = cat;
  renderSellProducts();
}
async function renderSellProducts() {
  try { sellProducts = await api('GET', '/api/products'); } catch(e) { return; }
  const s = (document.getElementById('sellSearch').value||'').toLowerCase();
  let list = sellProducts;
  if (s) list = list.filter(p => p.name.toLowerCase().includes(s));
  if (sellCat) list = list.filter(p => p.category === sellCat);
  list = list.filter(p => p.qty > 0);
  const c = document.getElementById('sellProductList');
  if (list.length === 0) { c.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>没有可售商品</p></div>'; renderSellCart(); return; }
  c.innerHTML = list.map(p => {
    const inCart = sellCart.find(x => x.product_id === p.id);
    return '<div class="sell-item"><div class="si-info"><strong>'+p.name+'</strong><small>库存: '+p.qty+'</small></div><div class="si-price">¥'+Number(p.price).toFixed(2)+'</div>'+
      (inCart ? '<div class="si-qty" style="display:flex;align-items:center;gap:.2rem"><input type="number" min="1" max="'+p.qty+'" value="'+inCart.qty+'" onchange="updSell(\''+p.id+'\',this.value)"><button class="btn btn-danger btn-sm" onclick="remSell(\''+p.id+'\')">✕</button></div>'
      : '<button class="btn btn-primary btn-sm" onclick="addSell(\''+p.id+'\')">＋</button>') + '</div>';
  }).join('');
  renderSellCart();
}
function addSell(id) { const p = sellProducts.find(x => x.id === id); if (p) { sellCart.push({product_id:p.id,product_name:p.name,qty:1,price:p.price}); renderSellProducts(); } }
function updSell(id, val) {
  const n = parseInt(val);
  const item = sellCart.find(c => c.product_id === id);
  if (!item) return;
  if (isNaN(n)||n<1) { sellCart = sellCart.filter(c => c.product_id !== id); }
  else { const p = sellProducts.find(x => x.id === id); if (p && n > p.qty) { toast('库存不足','warning'); return; } item.qty = n; }
  renderSellProducts();
}
function remSell(id) { sellCart = sellCart.filter(c => c.product_id !== id); renderSellProducts(); }

function renderSellCart() {
  const c = document.getElementById('sellCartList');
  document.getElementById('sellCartCount').textContent = sellCart.reduce((s,i) => s+i.qty,0) + ' 件';
  if (sellCart.length === 0) { c.innerHTML = '<div class="empty-state" style="padding:.5rem;"><p>点击商品旁的 ＋ 按钮添加</p></div>'; document.getElementById('sellTotal').textContent = '¥0.00'; document.getElementById('sellBtn').disabled = true; return; }
  document.getElementById('sellBtn').disabled = false;
  let total = 0;
  c.innerHTML = sellCart.map((item,idx) => {
    const sub = item.qty * item.price; total += sub;
    return '<div class="cart-item"><span class="ci-name">'+item.product_name+'</span><span class="ci-qty"><input type="number" min="1" max="'+(sellProducts.find(p=>p.id===item.product_id)||{}).qty||99+'" value="'+item.qty+'" onchange="updSell(\''+item.product_id+'\',this.value)"></span><span class="ci-subtotal">¥'+sub.toFixed(2)+'</span><button class="ci-del" onclick="remSell(\''+item.product_id+'\')">✕</button></div>';
  }).join('');
  document.getElementById('sellTotal').textContent = '¥'+total.toFixed(2);
}

async function confirmSell() {
  if (sellCart.length === 0) { toast('请添加商品','warning'); return; }
  const total = sellCart.reduce((s,i) => s+i.qty*i.price, 0);
  if (!confirm('确认售出 '+sellCart.reduce((s,i)=>s+i.qty,0)+' 件，合计 ¥'+total.toFixed(2)+'？')) return;
  try {
    await api('POST', '/api/sell', { items: sellCart.map(i => ({product_id:i.product_id,qty:i.qty,price:i.price})) });
    toast('✅ 售出成功！¥'+total.toFixed(2),'success');
    sellCart = []; renderSellProducts(); renderDashboard();
  } catch(e) { toast(e.message,'error'); }
}

// ---- Inventory ----
let invFilter = '';
function setInvFilter(el, f) {
  document.querySelectorAll('#page-inventory .tabs button').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); invFilter = f; renderInventory();
}
async function renderInventory() {
  let products;
  try {
    const p = new URLSearchParams();
    if (invFilter) p.set('stock_status', invFilter);
    const s = document.getElementById('invSearch').value.trim();
    if (s) p.set('search', s);
    products = await api('GET', '/api/products?'+p.toString());
  } catch(e) { return; }
  let set;
  try { set = await api('GET','/api/settings'); } catch(e) { set = {low_threshold:10,critical_threshold:3}; }
  const low = parseInt(set.low_threshold), critical = parseInt(set.critical_threshold);
  const c = document.getElementById('invList');
  if (products.length === 0) { c.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>暂无商品</p></div>'; return; }
  c.innerHTML = products.map(p => {
    let bdg, cls;
    if (p.qty <= critical) { bdg='缺货'; cls='stock-critical'; }
    else if (p.qty <= low) { bdg='不足'; cls='stock-low'; }
    else { bdg='正常'; cls='stock-ok'; }
    return '<div class="product-item"><div class="info"><strong>'+p.name+'</strong><small>'+(p.category||'')+(p.shelf?' · '+p.shelf:'')+' · ¥'+Number(p.price).toFixed(2)+'</small></div><span class="stock-badge '+cls+'">'+p.qty+' · '+bdg+'</span>'+
      (user && user.role==='admin' ? '<button class="btn btn-outline btn-sm" onclick="openStockModal(\''+p.id+'\')">🔄</button><button class="btn btn-outline btn-sm" onclick="editProduct(\''+p.id+'\')">✏️</button>' : '') + '</div>';
  }).join('');
}

// ---- Stock Modal ----
let stockMode = 'in';
async function openStockModal(productId) {
  const sel = document.getElementById('stockProductSelect');
  sel.innerHTML = '<option value="">-- 请选择 --</option>';
  try { const prods = await api('GET','/api/products'); prods.forEach(p => { sel.innerHTML += '<option value="'+p.id+'" '+(p.id===productId?'selected':'')+'>'+p.name+' ('+p.qty+')</option>'; }); } catch(e) {}
  document.getElementById('stockTabIn').className='active'; document.getElementById('stockTabOut').className='';
  stockMode='in';
  document.getElementById('stockCostGroup').style.display='block'; document.getElementById('stockPriceGroup').style.display='none';
  document.getElementById('stockConfirmBtn').className='btn btn-success'; document.getElementById('stockConfirmBtn').textContent='✅ 确认入库';
  document.getElementById('stockQty').value=1; document.getElementById('stockCost').value=''; document.getElementById('stockPrice').value=''; document.getElementById('stockNote').value='';
  openModal('stockModal');
}
function setStockTab(mode) {
  stockMode=mode;
  document.getElementById('stockTabIn').className=mode==='in'?'active':'';
  document.getElementById('stockTabOut').className=mode==='out'?'active':'';
  document.getElementById('stockCostGroup').style.display=mode==='in'?'block':'none';
  document.getElementById('stockPriceGroup').style.display=mode==='out'?'block':'none';
  document.getElementById('stockConfirmBtn').className=mode==='in'?'btn btn-success':'btn btn-warning';
  document.getElementById('stockConfirmBtn').textContent=mode==='in'?'✅ 确认入库':'📤 确认出库';
}
async function confirmStock() {
  const qty = parseInt(document.getElementById('stockQty').value);
  if (isNaN(qty)||qty<1) { toast('请输入数量','warning'); return; }
  const pid = document.getElementById('stockProductSelect').value;
  if (!pid) { toast('请选择商品','warning'); return; }
  const cost = parseFloat(document.getElementById('stockCost').value);
  const price = parseFloat(document.getElementById('stockPrice').value);
  const note = document.getElementById('stockNote').value.trim();
  try {
    if (stockMode==='in') { await api('POST','/api/stock/in',{product_id:pid,qty,cost:isNaN(cost)?undefined:cost,note}); toast('入库成功','success'); }
    else { await api('POST','/api/stock/out',{product_id:pid,qty,price:isNaN(price)?undefined:price,note}); toast('出库成功','success'); }
    closeModal('stockModal'); renderInventory(); renderSellProducts(); renderDashboard(); renderLogs();
  } catch(e) { toast(e.message,'error'); }
}

// ---- Product CRUD ----
function openProductModal() {
  document.getElementById('productModalTitle').textContent='添加商品'; document.getElementById('editProductId').value='';
  ['fName','fBarcode','fSupplier','fShelf'].forEach(id => document.getElementById(id).value='');
  document.getElementById('fQty').value=0; document.getElementById('fMinStock').value=5; document.getElementById('fCost').value=''; document.getElementById('fPrice').value=''; document.getElementById('fCategory').value='';
  openModal('productModal');
}
async function editProduct(id) {
  try { const p = (await api('GET','/api/products')).find(x=>x.id===id); if(!p)return;
    document.getElementById('productModalTitle').textContent='编辑商品'; document.getElementById('editProductId').value=p.id;
    document.getElementById('fName').value=p.name; document.getElementById('fBarcode').value=p.barcode||'';
    document.getElementById('fCategory').value=p.category||''; document.getElementById('fSupplier').value=p.supplier||'';
    document.getElementById('fQty').value=p.qty; document.getElementById('fMinStock').value=p.min_stock||5;
    document.getElementById('fCost').value=p.cost||''; document.getElementById('fPrice').value=p.price||'';
    document.getElementById('fShelf').value=p.shelf||''; openModal('productModal');
  } catch(e) { toast(e.message,'error'); }
}
async function saveProduct() {
  const id=document.getElementById('editProductId').value, name=document.getElementById('fName').value.trim(), cat=document.getElementById('fCategory').value, price=parseFloat(document.getElementById('fPrice').value);
  if(!name){toast('请输入名称','warning');return;} if(!cat){toast('请选择分类','warning');return;} if(!price){toast('请输入售价','warning');return;}
  const body={name,barcode:document.getElementById('fBarcode').value.trim(),category:cat,supplier:document.getElementById('fSupplier').value.trim(),qty:parseInt(document.getElementById('fQty').value)||0,min_stock:parseInt(document.getElementById('fMinStock').value)||5,cost:parseFloat(document.getElementById('fCost').value)||0,price,shelf:document.getElementById('fShelf').value.trim()};
  try { if(id){await api('PUT','/api/products/'+id,body);toast('已更新','success');}else{await api('POST','/api/products',body);toast('已添加','success');} closeModal('productModal');renderInventory();renderSellProducts(); } catch(e){toast(e.message,'error');}
}

// ---- Logs ----
let logPage = 1;
function resetLogFilters() {
  document.getElementById('logTypeFilter').value='';
  document.getElementById('logStartDate').value=daysAgo(7);
  document.getElementById('logEndDate').value=today();
  logPage=1; renderLogs();
}
async function renderLogs() {
  const type=document.getElementById('logTypeFilter').value, sd=document.getElementById('logStartDate').value, ed=document.getElementById('logEndDate').value;
  try {
    const data = await api('GET','/api/logs?'+new URLSearchParams({type,start_date:sd,end_date:ed,page:logPage,page_size:30}));
    const c = document.getElementById('logList');
    if (data.logs.length === 0) { c.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>暂无记录</p></div>'; document.getElementById('logPagination').innerHTML=''; return; }
    c.innerHTML = data.logs.map(l => {
      const tag = l.type==='in'?'tag-in':l.type==='out'?'tag-out':'tag-sell';
      const label = l.type==='in'?'入库':l.type==='out'?'出库':'售出';
      const delBtn = user && user.role==='admin' ? ' <button class="btn-sm-2" onclick="deleteLog('+l._idx+')" title="撤回此操作">↩</button>' : '';
      return '<div class="log-item"><div class="log-info"><span class="tag '+tag+'">'+label+'</span> <strong>'+l.product_name+'</strong> × '+l.qty+(l.operator?' · '+l.operator:'')+(l.note?' · '+l.note:'')+'</div><div class="log-time">'+l.time+delBtn+'</div></div>';
    }).join('');
    const pg = document.getElementById('logPagination');
    pg.innerHTML = '<button '+(logPage<=1?'disabled':'')+' onclick="logPage=1;renderLogs()">首页</button><button '+(logPage<=1?'disabled':'')+' onclick="logPage--;renderLogs()">上一页</button><span class="page-info">'+data.page+'/'+data.total_pages+' (共'+data.total+'条)</span><button '+(logPage>=data.total_pages?'disabled':'')+' onclick="logPage++;renderLogs()">下一页</button><button '+(logPage>=data.total_pages?'disabled':'')+' onclick="logPage='+data.total_pages+';renderLogs()">末页</button>';
  } catch(e) {}
}

// ---- Delete Log (Revert) ----
async function deleteLog(idx) {
  if (!confirm('确认撤回这条操作？库存将被恢复。')) return;
  try {
    const r = await api('DELETE','/api/logs/'+idx);
    toast('✅ '+r.message,'success');
    renderLogs(); renderInventory(); renderSellProducts(); renderDashboard();
  } catch(e) { toast(e.message,'error'); }
}

// ---- Reports ----
function onReportPeriodChange() {
  const p = document.getElementById('reportPeriod').value, t = today();
  if (p==='daily') { document.getElementById('reportStartDate').value=t; document.getElementById('reportEndDate').value=t; }
  else if (p==='weekly') { const d=new Date(); d.setDate(d.getDate()-d.getDay()); document.getElementById('reportStartDate').value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); document.getElementById('reportEndDate').value=t; }
  else if (p==='monthly') { document.getElementById('reportStartDate').value=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0')+'-01'; document.getElementById('reportEndDate').value=t; }
  else if (p==='yearly') { document.getElementById('reportStartDate').value=new Date().getFullYear()+'-01-01'; document.getElementById('reportEndDate').value=t; }
  renderReport();
}
function setPeriod(p) {
  if (p==='today') { document.getElementById('reportPeriod').value='daily'; document.getElementById('reportStartDate').value=today(); document.getElementById('reportEndDate').value=today(); }
  else if (p==='month') { document.getElementById('reportPeriod').value='monthly'; document.getElementById('reportStartDate').value=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0')+'-01'; document.getElementById('reportEndDate').value=today(); }
  renderReport();
}
async function renderReport() {
  const sd=document.getElementById('reportStartDate').value, ed=document.getElementById('reportEndDate').value;
  if (!sd||!ed) return;
  try {
    const data = await api('GET','/api/reports?'+new URLSearchParams({start_date:sd,end_date:ed}));
    document.getElementById('reportSummary').innerHTML =
      '<div class="stat-card"><div class="num" style="color:#16a34a">'+data.summary.totalInQty+'</div><div class="label">入库总数</div></div>' +
      '<div class="stat-card"><div class="num" style="color:#2563eb">'+data.summary.totalSellQty+'</div><div class="label">售出总数</div></div>' +
      '<div class="stat-card"><div class="num" style="color:#dc2626">¥'+Number(data.summary.totalSales).toFixed(0)+'</div><div class="label">销售金额</div></div>' +
      '<div class="stat-card"><div class="num">'+data.summary.totalSellItems+'</div><div class="label">交易笔数</div></div>';
    const top = document.getElementById('reportTopSell');
    if (data.topSell && data.topSell.length > 0) {
      top.style.display='block';
      document.getElementById('topSellList').innerHTML = data.topSell.map((p,i) => '<div class="product-item"><div class="info"><strong>'+(i+1)+'. '+p.name+'</strong></div><span style="font-weight:700;color:#dc2626">售出 '+p.qty+'</span></div>').join('');
    } else top.style.display='none';
  } catch(e) {}
}

// ---- Admin Users ----
async function renderUsers() {
  if (document.getElementById('adminUsers').style.display==='none') return;
  try {
    const users = await api('GET','/api/users');
    document.getElementById('userList').innerHTML = users.length===0 ? '<div class="empty-state"><p>暂无用户</p></div>' :
      users.map(u => '<div class="user-row"><div><strong>'+u.display_name+'</strong> <span class="role-badge '+(u.role==='admin'?'role-admin':'role-cashier')+'">'+(u.role==='admin'?'管理员':'收银员')+'</span><br><span style="font-size:.72rem;color:var(--gray-400)">'+u.username+'</span></div>'+(u.role!=='admin'?'<button class="btn btn-danger btn-sm" onclick="deleteUser(\''+u.id+'\')">删除</button>':'')+'</div>').join('');
  } catch(e) {}
}
function openUserModal() {
  document.getElementById('editUserId').value=''; document.getElementById('uUsername').value=''; document.getElementById('uUsername').disabled=false;
  document.getElementById('uDisplayName').value=''; document.getElementById('uPassword').value=''; document.getElementById('uRole').value='cashier';
  openModal('userModal');
}
async function saveUser() {
  const id=document.getElementById('editUserId').value, un=document.getElementById('uUsername').value.trim(), dn=document.getElementById('uDisplayName').value.trim(), pw=document.getElementById('uPassword').value, rl=document.getElementById('uRole').value;
  if(!dn){toast('请输入名称','warning');return;} if(!id&&!un){toast('请输入账号','warning');return;} if(!id&&!pw){toast('请输入密码','warning');return;}
  try { if(id){const b={display_name:dn,role:rl};if(pw)b.password=pw;await api('PUT','/api/users/'+id,b);toast('已更新','success');}else{await api('POST','/api/users',{username:un,password:pw,display_name:dn,role:rl});toast('已添加','success');} closeModal('userModal');renderUsers(); } catch(e){toast(e.message,'error');}
}
async function deleteUser(id){if(!confirm('确认删除？'))return;try{await api('DELETE','/api/users/'+id);toast('已删除','success');renderUsers();}catch(e){toast(e.message,'error');}}

// ---- Admin Settings ----
async function saveAdminSettings() {
  const low=parseInt(document.getElementById('setLow').value)||10, critical=parseInt(document.getElementById('setCritical').value)||3;
  const cats=document.getElementById('setCategories').value.split('\n').map(s=>s.trim()).filter(Boolean);
  try { await api('PUT','/api/settings',{low_threshold:low,critical_threshold:critical,categories:cats,shop_name:document.getElementById('setShopName').value.trim()||'我的便利店'}); toast('设置已保存','success'); categories=cats; loadCategories(); } catch(e){toast(e.message,'error');}
}
function switchAdminTab(el, tab) {
  document.querySelectorAll('#page-admin .tabs button').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('adminUsers').style.display=tab==='users'?'block':'none';
  document.getElementById('adminSettings').style.display=tab==='settings'?'block':'none';
  if (tab==='users') renderUsers();
}

// ---- Auto Refresh ----
setInterval(async () => {
  if (document.getElementById('app').classList.contains('show')) {
    const p = document.querySelector('.page.active');
    if (p) { const id = p.id; if (id==='page-dashboard') renderDashboard(); else if (id==='page-sell') renderSellProducts(); else if (id==='page-inventory') renderInventory(); else if (id==='page-reports') renderReport(); }
  }
}, 30000);

// ---- Init ----
(async function init() {
  if (token) {
    try { const d = await api('GET','/api/me'); user = d.user; await enterApp(); }
    catch(e) { localStorage.removeItem('cvs_token'); token = null; }
  }
})();
</script>
