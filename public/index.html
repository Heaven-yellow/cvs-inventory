<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>便利店库存 v3</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--warning:#f59e0b;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-800:#1f2937;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.1);--safe-bottom:env(safe-area-inset-bottom,0px);--font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}html{font-size:16px}body{font-family:var(--font);background:var(--gray-100);color:var(--gray-800);line-height:1.5;min-height:100vh;padding-bottom:70px}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:1rem}
.login-card{background:#fff;border-radius:16px;padding:2rem 1.5rem;width:100%;max-width:340px;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.login-card h1{text-align:center;margin-bottom:.2rem;font-size:1.25rem}
.login-card p{text-align:center;color:var(--gray-500);font-size:.8rem;margin-bottom:1rem}
.login-card .field{margin-bottom:.8rem}
.login-card label{display:block;font-size:.8rem;font-weight:500;margin-bottom:.25rem;color:var(--gray-600)}
.login-card input{width:100%;padding:.6rem .75rem;border:1px solid var(--gray-300);border-radius:8px;font-size:.9rem;outline:none;background:#fff}
.login-card input:focus{border-color:var(--primary);box-shadow:0 0 0 3px #dbeafe}
.login-card .btn-login{width:100%;padding:.65rem;border:none;border-radius:8px;font-size:.95rem;font-weight:600;background:var(--primary);color:#fff;cursor:pointer}
.login-card .btn-login:active{opacity:.85}
.login-error{color:var(--danger);font-size:.82rem;text-align:center;margin-top:.5rem;display:none}
.app{display:none}.app.show{display:block}
.topbar{background:#fff;padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.topbar h2{font-size:1rem;font-weight:600}
.topbar .user-info{font-size:.75rem;color:var(--gray-500);display:flex;align-items:center;gap:.4rem}
.topbar .logout-btn{border:none;background:none;color:var(--danger);font-size:.75rem;cursor:pointer}
.topbar .role-badge{display:inline-block;padding:1px 6px;border-radius:6px;font-size:.65rem;font-weight:600;margin-left:4px}
.topbar .sb{background:#fef3c7;color:#b45309}.topbar .ad{background:#dbeafe;color:var(--primary)}.topbar .ca{background:#dcfce7;color:#16a34a}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);display:flex;z-index:100;padding-bottom:var(--safe-bottom)}
.bottom-nav a{flex:1;text-align:center;padding:.45rem 0 .35rem;font-size:.65rem;color:var(--gray-400);text-decoration:none}
.bottom-nav a .nav-icon{font-size:1.3rem;display:block;margin-bottom:1px}
.bottom-nav a.active{color:var(--primary)}
.page{display:none;padding:.7rem;max-width:700px;margin:0 auto}
.page.active{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:.85rem;margin-bottom:.7rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;padding-bottom:.4rem;border-bottom:1px solid var(--gray-100)}
.card-header h3{font-size:.88rem;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin-bottom:.7rem}
.stat-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:.7rem;text-align:center}
.stat-card .num{font-size:1.3rem;font-weight:700;line-height:1.3}
.stat-card .label{font-size:.68rem;color:var(--gray-500)}
.product-item{display:flex;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--gray-100);gap:.5rem}
.product-item:last-child{border-bottom:none}
.product-item .info{flex:1;min-width:0}
.product-item .info strong{display:block;font-size:.85rem}
.product-item .info small{color:var(--gray-400);font-size:.7rem}
.stock-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.72rem;font-weight:600;white-space:nowrap}
.stock-ok{background:#dcfce7;color:#16a34a}.stock-low{background:#fef3c7;color:#b45309}.stock-critical{background:#fee2e2;color:var(--danger)}
.search-box{position:relative;margin-bottom:.6rem}
.search-box input{width:100%;padding:.5rem .75rem .5rem 1.9rem;border:1px solid var(--gray-300);border-radius:8px;font-size:.85rem;outline:none;background:#fff}
.search-box input:focus{border-color:var(--primary)}.search-box .icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--gray-400)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.3rem;padding:.45rem .8rem;border:none;border-radius:8px;font-size:.8rem;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-success{background:#16a34a;color:#fff}.btn-danger{background:#dc2626;color:#fff}.btn-warning{background:var(--warning);color:#fff}.btn-outline{background:transparent;border:1px solid var(--gray-300);color:var(--gray-600)}
.btn-block{width:100%;padding:.55rem;font-size:.88rem}.btn-lg{padding:.6rem 1.1rem;font-size:.88rem}.btn-sm{padding:.25rem .5rem;font-size:.72rem}.btn-xs{padding:.18rem .38rem;font-size:.65rem;border:1px solid var(--gray-300);border-radius:4px;background:#fff;cursor:pointer;color:var(--gray-600)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}.modal-overlay.center{align-items:center}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:slideUp .25s}
.modal-overlay.center .modal{border-radius:16px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{padding:.8rem 1rem;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:.9rem;font-weight:600}
.modal-close{width:30px;height:30px;border:none;background:none;font-size:1.2rem;cursor:pointer;border-radius:6px;color:var(--gray-400)}
.modal-body{padding:.9rem}.modal-footer{padding:.6rem .9rem;border-top:1px solid var(--gray-100);display:flex;gap:.5rem;justify-content:flex-end}
.form-group{margin-bottom:.7rem}
.form-group label{display:block;font-size:.75rem;font-weight:500;margin-bottom:.2rem;color:var(--gray-600)}
.form-group input,.form-group select{width:100%;padding:.45rem .65rem;border:1px solid var(--gray-300);border-radius:8px;font-size:.85rem;outline:none;background:#fff}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}
.form-group textarea{width:100%;padding:.45rem .65rem;border:1px solid var(--gray-300);border-radius:8px;font-size:.85rem;outline:none;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.sell-prod-list{max-height:200px;overflow-y:auto}
.sell-item{display:flex;align-items:center;padding:.5rem;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:.35rem;gap:.5rem}
.sell-item .si-info{flex:1;min-width:0}
.sell-item .si-info strong{font-size:.82rem;display:block}
.sell-item .si-info small{font-size:.7rem;color:var(--gray-400)}
.sell-item .si-price{font-weight:700;font-size:.88rem;color:var(--danger);white-space:nowrap}
.cart-item{display:flex;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--gray-100);gap:.3rem}
.cart-item .ci-name{flex:1;font-size:.8rem}
.cart-item .ci-qty input{width:44px;padding:.2rem;text-align:center;border:1px solid var(--gray-300);border-radius:4px;font-size:.8rem}
.cart-item .ci-subtotal{font-weight:600;font-size:.8rem;white-space:nowrap;min-width:55px;text-align:right}
.cart-item .ci-del{border:none;background:none;color:var(--danger);font-size:1rem;cursor:pointer;padding:0 .3rem}
.cart-total{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;font-size:1rem;font-weight:700}
.cart-total .total-price{color:var(--danger);font-size:1.2rem}
.tabs{display:flex;gap:.3rem;margin-bottom:.6rem;background:var(--gray-100);border-radius:8px;padding:3px;overflow-x:auto;flex-wrap:wrap}
.tabs button{flex-shrink:0;padding:.35rem .55rem;border:none;background:none;border-radius:6px;font-size:.75rem;font-weight:500;color:var(--gray-500);cursor:pointer}
.tabs button.active{background:#fff;color:var(--gray-800);box-shadow:var(--shadow)}
.toast-container{position:fixed;top:.6rem;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none;align-items:center}
.toast{pointer-events:auto;padding:.5rem .9rem;border-radius:8px;font-size:.8rem;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:320px;text-align:center}
.toast-success{background:#16a34a;color:#fff}.toast-error{background:#dc2626;color:#fff}.toast-warning{background:var(--warning);color:#fff}.toast-info{background:var(--primary);color:#fff}
.empty-state{text-align:center;padding:1.5rem;color:var(--gray-400);font-size:.82rem}
.empty-state .icon{font-size:2rem;margin-bottom:.4rem}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--gray-50);font-size:.78rem;gap:.3rem}
.log-item .log-info{flex:1;min-width:0}
.log-item .log-time{color:var(--gray-400);font-size:.7rem;white-space:nowrap;display:flex;align-items:center;gap:.3rem}
.filter-bar{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem;font-size:.78rem}
.filter-bar input,.filter-bar select{padding:.35rem .5rem;border:1px solid var(--gray-300);border-radius:6px;font-size:.78rem;outline:none;background:#fff}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--primary)}
.pagination{display:flex;gap:.3rem;align-items:center;justify-content:center;margin-top:.5rem;font-size:.78rem}
.pagination button{padding:.25rem .5rem;border:1px solid var(--gray-300);border-radius:4px;background:#fff;cursor:pointer}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination .page-info{color:var(--gray-500);font-size:.75rem}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.7rem;font-weight:600}
.tag-in{background:#dcfce7;color:#16a34a}.tag-out{background:#fef3c7;color:#b45309}.tag-sell{background:#dbeafe;color:var(--primary)}
.user-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid var(--gray-100);font-size:.82rem}
.role-badge{display:inline-block;padding:1px 6px;border-radius:6px;font-size:.68rem;font-weight:600}
.role-sa{background:#fef3c7;color:#b45309}.role-ad{background:#dbeafe;color:var(--primary)}.role-ca{background:#dcfce7;color:#16a34a}
</style>
</head>
<body>
<div class="login-page" id="loginPage">
  <div class="login-card">
    <h1>🏪 便利店库存</h1>
    <p>v3.0 多租户独立数据</p>
    <div class="field"><label>账号</label><input type="text" id="loginUsername" placeholder="输入账号"></div>
    <div class="field"><label>密码</label><input type="password" id="loginPassword" placeholder="输入密码"></div>
    <button class="btn-login" onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>
<div class="app" id="app">
  <div class="topbar"><h2 id="pageTitle">工作台</h2>
    <div class="user-info"><span id="userDisplay"></span><button class="logout-btn" onclick="doLogout()">退出</button></div>
  </div>
  <!-- 工作台 -->
  <div class="page active" id="page-dashboard">
    <div class="stats-grid" id="dashStats"></div>
    <div class="card"><div class="card-header"><h3>⚠️ 库存不足</h3></div><div id="dashLowStock"><div class="empty-state"><p>暂无 ✅</p></div></div></div>
    <div class="card"><div class="card-header"><h3>📋 最近操作</h3></div><div id="dashRecent"><div class="empty-state"><p>暂无记录</p></div></div></div>
  </div>
  <!-- 售出 -->
  <div class="page" id="page-sell">
    <div class="tabs" id="sellTabs2"><button class="active" onclick="setSellPage('sell')">🧾 售出</button><button onclick="setSellPage('history')">📋 已售记录</button></div>
    <div id="sellPanel">
      <div class="search-box"><span class="icon">🔍</span><input type="text" id="sellSearch" placeholder="搜索商品..." oninput="renderSellProducts()"></div>
      <div class="tabs" id="sellTabs"><button class="active" onclick="setSellCat(this,'')">全部</button></div>
      <div class="card" style="padding:.5rem;"><div class="sell-prod-list" id="sellProductList"><div class="empty-state"><div class="icon">📦</div><p>暂无商品</p></div></div></div>
      <div class="card"><div class="card-header"><h3>🛒 待售清单</h3><span id="sellCartCount">0 件</span></div>
        <div id="sellCartList"><div class="empty-state" style="padding:.5rem;"><p>点击 ＋ 加入</p></div></div>
        <div class="cart-total"><span>合计</span><span class="total-price" id="sellTotal">¥0.00</span></div>
        <button class="btn btn-success btn-block btn-lg" id="sellBtn" onclick="confirmSell()" disabled>✅ 确认售出</button>
      </div>
    </div>
    <div id="sellHistoryPanel" style="display:none">
      <div class="card"><div class="card-header"><h3>📋 已售记录（近1个月）</h3></div>
        <div class="filter-bar">
          <input type="date" id="sellLogStart" onchange="renderSellHistory()"><span style="color:var(--gray-400);font-size:.7rem;">至</span>
          <input type="date" id="sellLogEnd" onchange="renderSellHistory()">
          <input type="text" id="sellLogSearch" placeholder="商品名..." style="max-width:100px" oninput="renderSellHistory()">
        </div>
        <div id="sellLogList"><div class="empty-state"><p>加载中...</p></div></div>
        <div id="sellLogPage" class="pagination"></div>
      </div>
    </div>
  </div>
  <!-- 库存 -->
  <div class="page" id="page-inventory">
    <div class="search-box"><span class="icon">🔍</span><input type="text" id="invSearch" placeholder="搜索商品..." oninput="renderInventory()"></div>
    <div class="tabs"><button class="active" onclick="setInvFilter(this,'')">全部</button><button onclick="setInvFilter(this,'low')">⚠️ 不足</button><button onclick="setInvFilter(this,'critical')">🚨 缺货</button></div>
    <div id="invList"></div>
    <button class="btn btn-primary btn-block" id="addProductBtn" onclick="openProductModal()" style="margin-top:.4rem;">＋ 添加商品</button>
  </div>
  <!-- 入库日志 -->
  <div class="page" id="page-logs">
    <div class="card"><div class="card-header"><h3>📝 入库操作记录</h3><span style="font-size:.7rem;color:var(--gray-400)">只读，不可修改</span></div>
      <div class="filter-bar">
        <input type="date" id="logStart" onchange="renderLogs()"><span style="color:var(--gray-400);font-size:.7rem;">至</span>
        <input type="date" id="logEnd" onchange="renderLogs()">
        <button class="btn btn-outline btn-sm" onclick="resetLogFilters()">重置</button>
      </div>
      <div id="logList"><div class="empty-state"><p>加载中...</p></div></div>
      <div id="logPage" class="pagination"></div>
    </div>
  </div>
  <!-- 报表 -->
  <div class="page" id="page-reports">
    <div class="card"><div class="card-header"><h3>📊 数据报表</h3></div>
      <div class="filter-bar">
        <select id="reportPeriod" onchange="onReportChange()"><option value="daily">日报</option><option value="weekly">周报</option><option value="monthly">月报</option><option value="yearly">年报</option><option value="custom">自定义</option></select>
        <input type="date" id="rpStart" onchange="renderReport()"><span style="color:var(--gray-400);font-size:.7rem;">至</span>
        <input type="date" id="rpEnd" onchange="renderReport()">
        <button class="btn btn-outline btn-sm" onclick="setPer('today')">今天</button>
        <button class="btn btn-outline btn-sm" onclick="setPer('month')">本月</button>
      </div>
      <div id="reportSum" class="stats-grid"></div>
      <div id="reportTop" class="card" style="display:none"><div class="card-header"><h3>🏆 热销排行</h3></div><div id="topSellList"></div></div>
    </div>
  </div>
  <!-- 管理 -->
  <div class="page" id="page-admin">
    <div class="card"><div class="card-header"><h3>👥 用户管理</h3><span style="font-size:.7rem;color:var(--gray-400)">仅超级管理员</span></div>
      <button class="btn btn-primary btn-block" onclick="openUserModal()" style="margin-bottom:.5rem;">＋ 添加用户</button>
      <div id="userList"></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <a class="active" data-page="dashboard" onclick="switchPage('dashboard')"><span class="nav-icon">📊</span>工作台</a>
    <a data-page="sell" onclick="switchPage('sell')"><span class="nav-icon">🧾</span>售出</a>
    <a data-page="inventory" onclick="switchPage('inventory')"><span class="nav-icon">📦</span>库存</a>
    <a data-page="logs" onclick="switchPage('logs')"><span class="nav-icon">📝</span>入库日志</a>
    <a data-page="reports" onclick="switchPage('reports')"><span class="nav-icon">📊</span>报表</a>
    <a data-page="admin" onclick="switchPage('admin')"><span class="nav-icon">⚙️</span>管理</a>
  </nav>
</div>
<!-- Modals -->
<div class="modal-overlay center" id="productModal"><div class="modal">
  <div class="modal-header"><h3 id="pmTitle">商品</h3><button class="modal-close" onclick="closeModal('productModal')">✕</button></div>
  <div class="modal-body">
    <input type="hidden" id="editPid">
    <div class="form-group"><label>名称 *</label><input type="text" id="fName"></div>
    <div class="form-row"><div class="form-group"><label>条码</label><input type="text" id="fBarcode"></div><div class="form-group"><label>分类 *</label><select id="fCategory"></select></div></div>
    <div class="form-row"><div class="form-group"><label>库存</label><input type="number" id="fQty" min="0" value="0"></div><div class="form-group"><label>警戒</label><input type="number" id="fMin" min="0" value="5"></div></div>
    <div class="form-row"><div class="form-group"><label>进价</label><input type="number" id="fCost" min="0" step="0.01"></div><div class="form-group"><label>售价 *</label><input type="number" id="fPrice" min="0" step="0.01"></div></div>
    <div class="form-row"><div class="form-group"><label>供应商</label><input type="text" id="fSupplier"></div><div class="form-group"><label>货架</label><input type="text" id="fShelf"></div></div>
  </div>
  <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('productModal')">取消</button><button class="btn btn-primary" onclick="saveProduct()">保存</button></div>
</div></div>
<div class="modal-overlay center" id="stockModal"><div class="modal">
  <div class="modal-header"><h3>库存操作</h3><button class="modal-close" onclick="closeModal('stockModal')">✕</button></div>
  <div class="modal-body">
    <div class="tabs" style="margin-bottom:.6rem;"><button class="active" id="sTabIn" onclick="setSTab('in')">📥 入库</button><button id="sTabOut" onclick="setSTab('out')">📤 出库</button></div>
    <div class="form-group"><label>商品</label><select id="stockProdSel"></select></div>
    <div class="form-group"><label>数量</label><input type="number" id="stockQty" min="1" value="1"></div>
    <div class="form-group" id="scGroup"><label>进价（可选）</label><input type="number" id="stockCost" min="0" step="0.01"></div>
    <div class="form-group" id="spGroup" style="display:none"><label>售价（可选）</label><input type="number" id="stockPrice" min="0" step="0.01"></div>
    <div class="form-group"><label>备注</label><input type="text" id="stockNote" placeholder="如：供应商送货"></div>
  </div>
  <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('stockModal')">取消</button><button class="btn btn-success" id="stockCfmBtn" onclick="confirmStock()">✅ 确认入库</button></div>
</div></div>
<div class="modal-overlay center" id="userModal"><div class="modal">
  <div class="modal-header"><h3>用户</h3><button class="modal-close" onclick="closeModal('userModal')">✕</button></div>
  <div class="modal-body">
    <input type="hidden" id="editUid">
    <div class="form-group"><label>账号 *</label><input type="text" id="uName"></div>
    <div class="form-group"><label>名称 *</label><input type="text" id="uDisplay"></div>
    <div class="form-group"><label>密码</label><input type="password" id="uPass" placeholder="留空则不修改"></div>
    <div class="form-group"><label>角色</label><select id="uRole"><option value="admin">管理员</option><option value="cashier">收银员</option></select></div>
  </div>
  <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('userModal')">取消</button><button class="btn btn-primary" onclick="saveUser()">保存</button></div>
</div></div>
<div class="toast-container" id="toastContainer"></div>
<script>
const A=window.location.origin;let T=localStorage.getItem('cvs_token'),U=null;
async function api(m,p,b){const o={method:m,headers:{'Content-Type':'application/json'}};if(T)o.headers['Authorization']='Bearer '+T;if(b)o.body=JSON.stringify(b);const r=await fetch(A+p);return r.json()}

// Fix: fetch with body
async function api2(m,p,b){const o={method:m,headers:{'Content-Type':'application/json'}};if(T)o.headers['Authorization']='Bearer '+T;if(b)o.body=JSON.stringify(b);const r=await fetch(A+p,o);const d=await r.json();if(!r.ok)throw new Error(d.error||'请求失败');return d}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
async function doLogin(){const u=document.getElementById('loginUsername').value.trim(),p=document.getElementById('loginPassword').value.trim(),e=document.getElementById('loginError');e.style.display='none';if(!u||!p){e.textContent='请输入';e.style.display='block';return}try{const d=await api2('POST','/api/login',{username:u,password:p});T=d.token;U=d.user;localStorage.setItem('cvs_token',T);enterApp()}catch(x){e.textContent=x.message;e.style.display='block'}}
function doLogout(){localStorage.removeItem('cvs_token');T=null;U=null;document.getElementById('loginPage').style.display='flex';document.getElementById('app').classList.remove('show')}
function toast(msg,t){t=t||'info';const c=document.getElementById('toastContainer'),x=document.createElement('div');x.className='toast toast-'+t;x.textContent=msg;c.appendChild(x);setTimeout(()=>{x.style.opacity='0';x.style.transition='.3s';setTimeout(()=>x.remove(),300)},2000)}
async function enterApp(){document.getElementById('loginPage').style.display='none';document.getElementById('app').classList.add('show');const rl=U.role,n=(U.display_name||U.username)+' · '+(rl==='super_admin'?'超级管理员':rl==='admin'?'管理员':'收银员');document.getElementById('userDisplay').innerHTML=n+' <span class="role-badge '+(rl==='super_admin'?'sb':rl==='admin'?'ad':'ca')+'">'+rl+'</span>';const an=document.querySelector('[data-page="admin"]');if(an)an.style.display=rl==='super_admin'?'block':'none';document.getElementById('addProductBtn').style.display=rl!=='cashier'?'block':'none';document.getElementById('logStart').value=daysAgo(30);document.getElementById('logEnd').value=today();document.getElementById('sellLogStart').value=daysAgo(30);document.getElementById('sellLogEnd').value=today();document.getElementById('rpStart').value=today();document.getElementById('rpEnd').value=today();await loadCats();Promise.all([renderDash(),renderSell(),renderInv(),renderLogs(),renderReport(),renderUsers()])}
function switchPage(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');document.querySelectorAll('.bottom-nav a').forEach(a=>a.classList.remove('active'));const nav=document.querySelector('.bottom-nav a[data-page="'+n+'"]');if(nav)nav.classList.add('active');const t={dashboard:'工作台',sell:'售出',inventory:'库存管理',logs:'入库日志',reports:'数据报表',admin:'系统管理'};document.getElementById('pageTitle').textContent=t[n]||'';if(n==='dashboard')renderDash();if(n==='sell')renderSell();if(n==='inventory')renderInv();if(n==='logs')renderLogs();if(n==='reports')renderReport();if(n==='admin')renderUsers()}
function openModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}
document.addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))e.target.classList.remove('show')});
let cats=[];
async function loadCats(){try{const s=await api2('GET','/api/settings');cats=s.categories||[]}catch(e){}document.getElementById('sellTabs').innerHTML='<button class="active" onclick="setSellCat(this,\'\')">全部</button>';cats.forEach(c=>{document.getElementById('sellTabs').innerHTML+='<button onclick="setSellCat(this,\''+c+'\')">'+c+'</button>'});const f=document.getElementById('fCategory');if(f){f.innerHTML='<option value="">请选择</option>';cats.forEach(c=>{f.innerHTML+='<option value="'+c+'">'+c+'</option>'})}}
// Dashboard
async function renderDash(){try{const d=await api2('GET','/api/dashboard');document.getElementById('dashStats').innerHTML='<div class="stat-card"><div class="num">'+d.totalProducts+'</div><div class="label">商品总数</div></div><div class="stat-card"><div class="num">¥'+Number(d.totalValue).toFixed(0)+'</div><div class="label">库存价值</div></div><div class="stat-card"><div class="num" style="color:#f59e0b">'+d.lowStock+'</div><div class="label">不足</div></div><div class="stat-card"><div class="num" style="color:#dc2626">'+d.criticalStock+'</div><div class="label">缺货</div></div><div class="stat-card"><div class="num" style="color:#2563eb">'+d.todaySales.sellQty+'</div><div class="label">今日售出</div></div><div class="stat-card"><div class="num" style="color:#16a34a">'+d.todaySales.inQty+'</div><div class="label">今日入库</div></div>';const l=document.getElementById('dashLowStock');if(d.lowItems.length===0)l.innerHTML='<div class="empty-state"><p>暂无 ✅</p></div>';else l.innerHTML=d.lowItems.map(p=>'<div class="product-item"><div class="info"><strong>'+p.name+'</strong><small>'+(p.category||'')+'</small></div><span class="stock-badge stock-low">'+p.qty+'</span></div>').join('');const r=document.getElementById('dashRecent');if(d.recentLogs.length===0)r.innerHTML='<div class="empty-state"><p>暂无</p></div>';else r.innerHTML=d.recentLogs.map(l=>'<div class="log-item"><div class="log-info">'+(l.type==='in'?'📥':l.type==='out'?'📤':'🧾')+' <strong>'+l.product_name+'</strong> '+(l.type==='in'?'入库':l.type==='out'?'出库':'售出')+' '+l.qty+(l.operator?' · '+l.operator:'')+'</div><div class="log-time">'+l.time+'</div></div>').join('')}catch(e){}}
// Sell
let sellPs=[],sellCart=[],sellCat='',sellPage='sell';
function setSellPage(p){sellPage=p;document.getElementById('sellPanel').style.display=p==='sell'?'block':'none';document.getElementById('sellHistoryPanel').style.display=p==='history'?'block':'none';document.querySelectorAll('#sellTabs2 button').forEach(b=>b.classList.remove('active'));document.querySelector('#sellTabs2 button[onclick*="'+p+'"]').classList.add('active');if(p==='history')renderSellHistory()}
function setSellCat(el,c){document.querySelectorAll('#sellTabs button').forEach(b=>b.classList.remove('active'));el.classList.add('active');sellCat=c;renderSellProducts()}
async function renderSell(){document.getElementById('sellSearch').value='';sellCart=[];renderSellProducts()}
async function renderSellProducts(){try{sellPs=await api2('GET','/api/products')}catch(e){return}const s=(document.getElementById('sellSearch').value||'').toLowerCase();let l=sellPs;if(s)l=l.filter(p=>p.name.toLowerCase().includes(s));if(sellCat)l=l.filter(p=>p.category===sellCat);l=l.filter(p=>p.qty>0);const c=document.getElementById('sellProductList');if(l.length===0){c.innerHTML='<div class="empty-state"><div class="icon">📦</div><p>无商品</p></div>';renderSellCart();return}c.innerHTML=l.map(p=>{const inCart=sellCart.find(x=>x.product_id===p.id);return'<div class="sell-item"><div class="si-info"><strong>'+p.name+'</strong><small>库存:'+p.qty+'</small></div><div class="si-price">¥'+Number(p.price).toFixed(2)+'</div>'+(inCart?'<div style="display:flex;align-items:center;gap:.2rem"><input type="number" min="1" max="'+p.qty+'" value="'+inCart.qty+'" style="width:40px;padding:.2rem;text-align:center;border:1px solid #d1d5db;border-radius:4px;font-size:.8rem" onchange="updSell(\''+p.id+'\',this.value)"><button class="btn btn-danger btn-sm" onclick="rmSell(\''+p.id+'\')">✕</button></div>':'<button class="btn btn-primary btn-sm" onclick="addSell(\''+p.id+'\')">＋</button>')+'</div>'}).join('');renderSellCart()}
function addSell(id){const p=sellPs.find(x=>x.id===id);if(p){sellCart.push({product_id:p.id,product_name:p.name,qty:1,price:p.price});renderSellProducts()}}
function updSell(id,v){const n=parseInt(v),item=sellCart.find(c=>c.product_id===id);if(!item)return;if(isNaN(n)||n<1){sellCart=sellCart.filter(c=>c.product_id!==id)}else{const p=sellPs.find(x=>x.id===id);if(p&&n>p.qty){toast('库存不足','warning');return}item.qty=n}renderSellProducts()}
function rmSell(id){sellCart=sellCart.filter(c=>c.product_id!==id);renderSellProducts()}
function renderSellCart(){const c=document.getElementById('sellCartList');document.getElementById('sellCartCount').textContent=sellCart.reduce((s,i)=>s+i.qty,0)+'件';if(!sellCart.length){c.innerHTML='<div class="empty-state" style="padding:.5rem"><p>点击 ＋ 加入</p></div>';document.getElementById('sellTotal').textContent='¥0.00';document.getElementById('sellBtn').disabled=true;return}document.getElementById('sellBtn').disabled=false;let t=0;c.innerHTML=sellCart.map((item,idx)=>{const sub=item.qty*item.price;t+=sub;return'<div class="cart-item"><span class="ci-name">'+item.product_name+'</span><span class="ci-qty"><input type="number" min="1" max="'+(sellPs.find(p=>p.id===item.product_id)||{}).qty||99+'" value="'+item.qty+'" onchange="updSell(\''+item.product_id+'\',this.value)"></span><span class="ci-subtotal">¥'+sub.toFixed(2)+'</span><button class="ci-del" onclick="rmSell(\''+item.product_id+'\')">✕</button></div>'}).join('');document.getElementById('sellTotal').textContent='¥'+t.toFixed(2)}
async function confirmSell(){if(!sellCart.length){toast('请添加商品','warning');return}const t=sellCart.reduce((s,i)=>s+i.qty*i.price,0);if(!confirm('确认售出 '+sellCart.reduce((s,i)=>s+i.qty,0)+' 件，合计 ¥'+t.toFixed(2)+'？'))return;try{await api2('POST','/api/sell',{items:sellCart.map(i=>({product_id:i.product_id,qty:i.qty,price:i.price}))});toast('✅ 售出成功 ¥'+t.toFixed(2),'success');sellCart=[];renderSellProducts();renderDash();renderSellHistory()}catch(e){toast(e.message,'error')}}
// Sell History
let shPage=1;
async function renderSellHistory(){const sd=document.getElementById('sellLogStart').value,ed=document.getElementById('sellLogEnd').value,search=document.getElementById('sellLogSearch').value.trim();try{const d=await api2('GET','/api/sell-logs?'+new URLSearchParams({start_date:sd||'2000-01-01',end_date:ed||'2099-12-31',search,page:shPage,page_size:20}));const c=document.getElementById('sellLogList');if(d.logs.length===0){c.innerHTML='<div class="empty-state"><p>暂无记录</p></div>';document.getElementById('sellLogPage').innerHTML='';return}c.innerHTML=d.logs.map(l=>'<div class="log-item"><div class="log-info"><span class="tag tag-sell">售出</span> <strong>'+l.product_name+'</strong> ×'+l.qty+(l.operator?' · '+l.operator:'')+'</div><div class="log-time">'+l.time+' <button class="btn-xs" onclick="revertSell('+l._idx+')">↩ 撤回</button></div></div>').join('');const pg=document.getElementById('sellLogPage');pg.innerHTML='<button '+(shPage<=1?'disabled':'')+' onclick="shPage=1;renderSellHistory()">首页</button><button '+(shPage<=1?'disabled':'')+' onclick="shPage--;renderSellHistory()">上一页</button><span class="page-info">'+d.page+'/'+d.total_pages+'</span><button '+(shPage>=d.total_pages?'disabled':'')+' onclick="shPage++;renderSellHistory()">下一页</button>' }catch(e){}}
async function revertSell(idx){if(!confirm('撤回此售出操作，库存将恢复？'))return;try{const r=await api2('POST','/api/sell-logs/'+idx+'/revert');toast('✅ '+r.message,'success');renderSellHistory();renderDash();renderInv();renderSellProducts()}catch(e){toast(e.message,'error')}}
// Inventory
let invFilter='';
function setInvFilter(el,f){document.querySelectorAll('#page-inventory .tabs button').forEach(b=>b.classList.remove('active'));el.classList.add('active');invFilter=f;renderInv()}
async function renderInv(){let prods;try{const p=new URLSearchParams();if(invFilter)p.set('stock_status',invFilter);const s=document.getElementById('invSearch').value.trim();if(s)p.set('search',s);prods=await api2('GET','/api/products?'+p.toString())}catch(e){return}let set;try{set=await api2('GET','/api/settings')}catch(e){set={low_threshold:10,critical_threshold:3}}const lo=parseInt(set.low_threshold),cr=parseInt(set.critical_threshold),c=document.getElementById('invList');if(prods.length===0){c.innerHTML='<div class="empty-state"><div class="icon">📦</div><p>暂无商品</p></div>';return}c.innerHTML=prods.map(p=>{let bd,cls;if(p.qty<=cr){bd='缺货';cls='stock-critical'}else if(p.qty<=lo){bd='不足';cls='stock-low'}else{bd='正常';cls='stock-ok'}return'<div class="product-item"><div class="info"><strong>'+p.name+'</strong><small>'+(p.category||'')+(p.shelf?' · '+p.shelf:'')+' · ¥'+Number(p.price).toFixed(2)+'</small></div><span class="stock-badge '+cls+'">'+p.qty+' · '+bd+'</span>'+(U&&U.role!=='cashier'?'<button class="btn btn-outline btn-sm" onclick="openStockModal(\''+p.id+'\')">🔄</button><button class="btn btn-outline btn-sm" onclick="editProduct(\''+p.id+'\')">✏️</button>':'')+'</div>'}).join('')}
// Stock Modal
let sMode='in';
async function openStockModal(pid){const s=document.getElementById('stockProdSel');s.innerHTML='<option value="">--请选择--</option>';try{const ps=await api2('GET','/api/products');ps.forEach(p=>{s.innerHTML+='<option value="'+p.id+'" '+(p.id===pid?'selected':'')+'>'+p.name+' ('+p.qty+')</option>'})}catch(e){}setSTab('in');document.getElementById('stockQty').value=1;document.getElementById('stockCost').value='';document.getElementById('stockPrice').value='';document.getElementById('stockNote').value='';openModal('stockModal')}
function setSTab(m){sMode=m;document.getElementById('sTabIn').className=m==='in'?'active':'';document.getElementById('sTabOut').className=m==='out'?'active':'';document.getElementById('scGroup').style.display=m==='in'?'block':'none';document.getElementById('spGroup').style.display=m==='out'?'block':'none';document.getElementById('stockCfmBtn').className=m==='in'?'btn btn-success':'btn btn-warning';document.getElementById('stockCfmBtn').textContent=m==='in'?'✅ 确认入库':'📤 确认出库'}
async function confirmStock(){const qty=parseInt(document.getElementById('stockQty').value);if(isNaN(qty)||qty<1){toast('输入数量','warning');return}const pid=document.getElementById('stockProdSel').value;if(!pid){toast('请选择商品','warning');return}const cost=parseFloat(document.getElementById('stockCost').value),price=parseFloat(document.getElementById('stockPrice').value),note=document.getElementById('stockNote').value.trim();try{if(sMode==='in'){await api2('POST','/api/stock/in',{product_id:pid,qty,cost:isNaN(cost)?undefined:cost,note});toast('入库成功','success')}else{await api2('POST','/api/stock/out',{product_id:pid,qty,price:isNaN(price)?undefined:price,note});toast('出库成功','success')}closeModal('stockModal');renderInv();renderSellProducts();renderDash();renderLogs()}catch(e){toast(e.message,'error')}}
// Product CRUD
function openProductModal(){document.getElementById('pmTitle').textContent='添加商品';document.getElementById('editPid').value='';['fName','fBarcode','fSupplier','fShelf'].forEach(i=>document.getElementById(i).value='');document.getElementById('fQty').value=0;document.getElementById('fMin').value=5;document.getElementById('fCost').value='';document.getElementById('fPrice').value='';document.getElementById('fCategory').value='';openModal('productModal')}
async function editProduct(id){try{const p=(await api2('GET','/api/products')).find(x=>x.id===id);if(!p)return;document.getElementById('pmTitle').textContent='编辑商品';document.getElementById('editPid').value=p.id;document.getElementById('fName').value=p.name;document.getElementById('fBarcode').value=p.barcode||'';document.getElementById('fCategory').value=p.category||'';document.getElementById('fSupplier').value=p.supplier||'';document.getElementById('fQty').value=p.qty;document.getElementById('fMin').value=p.min_stock||5;document.getElementById('fCost').value=p.cost||'';document.getElementById('fPrice').value=p.price||'';document.getElementById('fShelf').value=p.shelf||'';openModal('productModal')}catch(e){toast(e.message,'error')}}
async function saveProduct(){const id=document.getElementById('editPid').value,n=document.getElementById('fName').value.trim(),c=document.getElementById('fCategory').value,p=parseFloat(document.getElementById('fPrice').value);if(!n){toast('请输入名称','warning');return}if(!c){toast('请选择分类','warning');return}if(!p){toast('请输入售价','warning');return}const b={name:n,barcode:document.getElementById('fBarcode').value.trim(),category:c,supplier:document.getElementById('fSupplier').value.trim(),qty:parseInt(document.getElementById('fQty').value)||0,min_stock:parseInt(document.getElementById('fMin').value)||5,cost:parseFloat(document.getElementById('fCost').value)||0,price:p,shelf:document.getElementById('fShelf').value.trim()};try{if(id){await api2('PUT','/api/products/'+id,b);toast('已更新','success')}else{await api2('POST','/api/products',b);toast('已添加','success')}closeModal('productModal');renderInv();renderSellProducts()}catch(e){toast(e.message,'error')}}
// Logs (入库 only, read-only)
let logPage=1;
function resetLogFilters(){document.getElementById('logStart').value=daysAgo(30);document.getElementById('logEnd').value=today();logPage=1;renderLogs()}
async function renderLogs(){const sd=document.getElementById('logStart').value,ed=document.getElementById('logEnd').value;try{const d=await api2('GET','/api/logs?'+new URLSearchParams({type:'in',start_date:sd||'2000-01-01',end_date:ed||'2099-12-31',page:logPage,page_size:30}));const c=document.getElementById('logList');if(d.logs.length===0){c.innerHTML='<div class="empty-state"><div class="icon">📝</div><p>暂无入库记录</p></div>';document.getElementById('logPage').innerHTML='';return}c.innerHTML=d.logs.map(l=>'<div class="log-item"><div class="log-info"><span class="tag tag-in">入库</span> <strong>'+l.product_name+'</strong> ×'+l.qty+(l.operator?' · '+l.operator:'')+(l.note?' · '+l.note:'')+'</div><div class="log-time">'+l.time+(U&&U.role!=='cashier'?' <button class="btn-xs" onclick="deleteLog('+l._idx+')" title="删除并扣除库存">🗑️</button>':'')+'</div></div>').join('');const pg=document.getElementById('logPage');pg.innerHTML='<button '+(logPage<=1?'disabled':'')+' onclick="logPage=1;renderLogs()">首页</button><button '+(logPage<=1?'disabled':'')+' onclick="logPage--;renderLogs()">上一页</button><span class="page-info">'+d.page+'/'+d.total_pages+' (共'+d.total+'条)</span><button '+(logPage>=d.total_pages?'disabled':'')+' onclick="logPage++;renderLogs()">下一页</button>' }catch(e){}}
async function deleteLog(idx){if(!confirm('删除此入库记录，库存将被扣除。确认？'))return;try{const r=await api2('DELETE','/api/logs/'+idx);toast('✅ '+r.message,'success');renderLogs();renderInv();renderDash()}catch(e){toast(e.message,'error')}}
// Reports
function onReportChange(){const p=document.getElementById('reportPeriod').value,t=today();if(p==='daily'){document.getElementById('rpStart').value=t;document.getElementById('rpEnd').value=t}else if(p==='weekly'){const d=new Date();d.setDate(d.getDate()-d.getDay());document.getElementById('rpStart').value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');document.getElementById('rpEnd').value=t}else if(p==='monthly'){document.getElementById('rpStart').value=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0')+'-01';document.getElementById('rpEnd').value=t}else if(p==='yearly'){document.getElementById('rpStart').value=new Date().getFullYear()+'-01-01';document.getElementById('rpEnd').value=t}renderReport()}
function setPer(p){if(p==='today'){document.getElementById('reportPeriod').value='daily';document.getElementById('rpStart').value=today();document.getElementById('rpEnd').value=today()}else if(p==='month'){document.getElementById('reportPeriod').value='monthly';document.getElementById('rpStart').value=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0')+'-01';document.getElementById('rpEnd').value=today()}renderReport()}
async function renderReport(){const sd=document.getElementById('rpStart').value,ed=document.getElementById('rpEnd').value;if(!sd||!ed)return;try{const d=await api2('GET','/api/reports?'+new URLSearchParams({start_date:sd,end_date:ed}));document.getElementById('reportSum').innerHTML='<div class="stat-card"><div class="num" style="color:#16a34a">'+d.summary.totalInQty+'</div><div class="label">入库总数</div></div><div class="stat-card"><div class="num" style="color:#2563eb">'+d.summary.totalSellQty+'</div><div class="label">售出总数</div></div><div class="stat-card"><div class="num" style="color:#dc2626">¥'+Number(d.summary.totalSales).toFixed(0)+'</div><div class="label">销售金额</div></div><div class="stat-card"><div class="num">'+d.summary.totalSellItems+'</div><div class="label">交易笔数</div></div>';const t=document.getElementById('reportTop');if(d.topSell&&d.topSell.length>0){t.style.display='block';document.getElementById('topSellList').innerHTML=d.topSell.map((p,i)=>'<div class="product-item"><div class="info"><strong>'+(i+1)+'. '+p.name+'</strong></div><span style="font-weight:700;color:#dc2626">售出 '+p.qty+'</span></div>').join('')}else t.style.display='none'}catch(e){}}
// Users
async function renderUsers(){if(document.getElementById('page-admin').classList.contains('active')===false)return;try{const users=await api2('GET','/api/users');document.getElementById('userList').innerHTML=users.length===0?'<div class="empty-state"><p>暂无用户</p></div>':users.map(u=>{const rl=u.role==='super_admin'?'超级管理员':u.role==='admin'?'管理员':'收银员';const cls=u.role==='super_admin'?'role-sa':u.role==='admin'?'role-ad':'role-ca';return'<div class="user-row"><div><strong>'+u.display_name+'</strong> <span class="role-badge '+cls+'">'+rl+'</span><br><span style="font-size:.72rem;color:var(--gray-400)">'+u.username+'</span></div>'+(u.role!=='super_admin'?'<div style="display:flex;gap:.3rem"><button class="btn btn-outline btn-sm" onclick="editUser(\''+u.id+'\',\''+u.username+'\',\''+u.display_name+'\',\''+u.role+'\')">✏️</button><button class="btn btn-danger btn-sm" onclick="deleteUser(\''+u.id+'\',\''+u.display_name+'\')">删除</button></div>':'')+'</div>'}).join('')}catch(e){}}
function openUserModal(){document.getElementById('editUid').value='';document.getElementById('uName').value='';document.getElementById('uName').disabled=false;document.getElementById('uDisplay').value='';document.getElementById('uPass').value='';document.getElementById('uRole').value='admin';openModal('userModal')}
function editUser(id,un,dn,rl){document.getElementById('editUid').value=id;document.getElementById('uName').value=un;document.getElementById('uName').disabled=true;document.getElementById('uDisplay').value=dn;document.getElementById('uPass').value='';document.getElementById('uRole').value=rl;openModal('userModal')}
async function saveUser(){const id=document.getElementById('editUid').value,un=document.getElementById('uName').value.trim(),dn=document.getElementById('uDisplay').value.trim(),pw=document.getElementById('uPass').value,rl=document.getElementById('uRole').value;if(!dn){toast('请输入名称','warning');return}if(!id&&!un){toast('请输入账号','warning');return}try{if(id){const b={display_name:dn,role:rl};if(pw)b.password=pw;await api2('PUT','/api/users/'+id,b);toast('已更新','success')}else{if(!pw){toast('请输入密码','warning');return}await api2('POST','/api/users',{username:un,password:pw,display_name:dn,role:rl});toast('已添加','success')}closeModal('userModal');renderUsers()}catch(e){toast(e.message,'error')}}
async function deleteUser(id,nm){if(!confirm('确认删除用户「'+nm+'」？其数据也将被清除。'))return;try{await api2('DELETE','/api/users/'+id);toast('已删除','success');renderUsers()}catch(e){toast(e.message,'error')}}
// Auto refresh
setInterval(async()=>{if(document.getElementById('app').classList.contains('show')){const p=document.querySelector('.page.active');if(p){const id=p.id;if(id==='page-dashboard')renderDash();else if(id==='page-sell'){if(sellPage==='sell')renderSellProducts();else renderSellHistory()}else if(id==='page-inventory')renderInv();else if(id==='page-reports')renderReport()}}},30000);
// Init
(async function init(){if(T){try{const d=await api2('GET','/api/me');U=d.user;await enterApp()}catch(e){localStorage.removeItem('cvs_token');T=null}}})();
</script>
